<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Gestion — Poder Judicial del Peru</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="inline_data_v4.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --primary: #A52020;
  --primary-dark: #7A1515;
  --primary-light: #FFF5F5;
  --primary-glow: rgba(165, 32, 32, 0.15);

  --bg-page: #F5F4F2;
  --bg-card: #FFFFFF;
  --bg-elevated: #FAFAFA;

  --border: #E8E4DF;
  --border-focus: #A52020;

  --text-heading: #1A1A2E;
  --text-body: #3D3D4E;
  --text-muted: #7A7A8C;
  --text-inverse: #FFFFFF;

  --accent-blue: #2563EB;
  --accent-green: #059669;
  --accent-amber: #D97706;
  --accent-purple: #7C3AED;
  --accent-rose: #E11D48;

  --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --shadow-xl: 0 16px 48px rgba(0,0,0,0.16);

  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 24px;

  --trans-fast: 0.12s ease;
  --trans-normal: 0.2s ease;
  --trans-slow: 0.3s ease;
}

/* ===== DARK MODE ===== */
body.dark-mode {
  --bg-page: #0F1419;
  --bg-card: #1A2332;
  --bg-elevated: #243447;
  --border: #2D3E50;
  --text-heading: #E8EAED;
  --text-body: #B0B8C1;
  --text-muted: #6B7785;
  --primary-light: #2D1F1F;
  --primary-glow: rgba(165, 32, 32, 0.3);
}
body.dark-mode .pj-header{background:var(--bg-card); border-bottom-color:var(--primary);}
body.dark-mode .tabs-wrap{background:var(--bg-card);}
body.dark-mode .card{background:var(--bg-card); border-color:var(--border);}
body.dark-mode .stat-box{background:var(--bg-card); border-color:var(--border);}
body.dark-mode .search-exp-wrap{background:linear-gradient(135deg,#1A2332,#1E2D3D);border-color:#2D3E50;}
body.dark-mode .search-exp-title{color:#60A5FA;}
body.dark-mode .exp-header{background:linear-gradient(135deg,#1A2332,#1E2D3D);border-color:#2D3E50;}
body.dark-mode .exp-details-grid{background:#1A2332;border-color:#2D3E50;}
body.dark-mode .exp-field{background:var(--bg-card);border-color:#2D3E50;}
body.dark-mode .red-band{background:linear-gradient(90deg,#1A0A0A 0%,#2D1515 50%,#1A0A0A 100%);}
body.dark-mode input,body.dark-mode select,body.dark-mode textarea{background:var(--bg-card);border-color:#2D3E50;color:var(--text-body);}
body.dark-mode thead th{background:linear-gradient(90deg,var(--primary-dark),var(--primary));}
body.dark-mode tbody tr:nth-child(even){background:var(--bg-elevated);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Barlow',sans-serif;
  background:var(--bg-page);
  color:var(--text-body);
  min-height:100vh;
  font-size:14px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}

/* ========== LOGIN SCREEN ========== */
.login-screen {
  position:fixed; top:0; left:0; right:0; bottom:0;
  background:linear-gradient(135deg, #0D0D1A 0%, #1A0A0A 40%, #2D1515 70%, #1A1A2E 100%);
  display:flex; align-items:center; justify-content:center;
  z-index:10000;
  overflow:hidden;
}
.login-screen::before{
  content:''; position:absolute; top:0; left:0; right:0; bottom:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23A52020' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  opacity:0.6;
  animation:bgShift 20s ease-in-out infinite alternate;
  pointer-events:none;
  z-index:-1;
}
@keyframes bgShift{
  0%{opacity:0.4; transform:scale(1);}
  100%{opacity:0.7; transform:scale(1.05);}
}
.login-screen::after{
  content:''; position:absolute; bottom:-50%; left:-50%; width:200%; height:200%;
  background:radial-gradient(ellipse at center, rgba(165,32,32,0.1) 0%, transparent 60%);
  animation:pulse 8s ease-in-out infinite;
  pointer-events:none;
  z-index:-1;
}
@keyframes pulse{
  0%,100%{transform:scale(0.8); opacity:0.3;}
  50%{transform:scale(1.1); opacity:0.5;}
}
.login-card {
  background:var(--bg-card);
  border-radius:var(--radius-xl);
  padding:52px 48px;
  width:100%; max-width:400px;
  box-shadow:0 25px 60px rgba(0,0,0,0.35);
  text-align:center;
  position:relative;
  animation:loginIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  border:1px solid rgba(165,32,32,0.1);
  z-index:1;
}
@keyframes loginIn{
  0%{opacity:0; transform:translateY(40px) scale(0.9);}
  60%{opacity:1; transform:translateY(-5px) scale(1.02);}
  100%{opacity:1; transform:translateY(0) scale(1);}
}
.login-emblem{
  width:80px; height:80px;
  background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  margin:0 auto 24px;
  box-shadow:0 8px 32px rgba(165,32,32,0.4), inset 0 2px 0 rgba(255,255,255,0.2);
  overflow:hidden;
}
.login-emblem img{
  width:100%; height:100%;
  object-fit:contain;
  padding:8px;
}
.login-org{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px; font-weight:600; color:var(--text-muted);
  letter-spacing:3px; text-transform:uppercase;
  margin-bottom:4px;
}
.login-court{
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px; font-weight:800; color:var(--primary);
  text-transform:uppercase; letter-spacing:1px;
  margin-bottom:2px;
}
.login-subtitle{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px; font-weight:500; color:var(--text-muted);
  text-transform:uppercase; letter-spacing:0.5px;
  margin-bottom:32px;
}
.login-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:18px; font-weight:700; color:var(--text-heading);
  margin-bottom:24px;
}
.login-input-group{position:relative; margin-bottom:16px;}
.login-input{
  width:100%; padding:16px 20px;
  font-size:15px; font-family:'Barlow',sans-serif;
  border:2px solid var(--border); border-radius:var(--radius-md);
  background:var(--bg-page);
  transition:var(--trans-normal);
  text-align:center; letter-spacing:4px; font-weight:600;
}
.login-input:focus{
  outline:none; border-color:var(--primary);
  box-shadow:0 0 0 4px var(--primary-glow);
}
.login-btn{
  width:100%; padding:16px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:var(--text-inverse);
  border:none; border-radius:var(--radius-md);
  font-size:15px; font-weight:700; font-family:'Barlow Condensed',sans-serif;
  letter-spacing:1px; text-transform:uppercase;
  cursor:pointer;
  transition:var(--trans-normal);
  box-shadow:0 4px 16px rgba(165,32,32,0.3);
}
.login-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(165,32,32,0.4);
}
.login-btn:active{transform:translateY(0);}
.login-error{
  background:linear-gradient(135deg,#FEF2F2,#FFF5F5);
  color:var(--accent-rose);
  padding:14px 18px;
  border-radius:var(--radius-md);
  margin-top:16px;
  font-size:13px; font-weight:600;
  border:1px solid rgba(225,29,72,0.2);
}
.login-remember{
  display:flex; align-items:center; justify-content:center;
  gap:10px; margin-top:20px;
}
.login-remember input{width:18px; height:18px; accent-color:var(--primary);}
.login-remember label{font-size:13px; color:var(--text-muted);}
.locked-msg{
  color:var(--text-muted); font-size:13px;
  margin-top:12px; font-style:italic;
}

/* ========== HEADER ========== */
.pj-header{
  background:var(--bg-card);
  border-bottom:3px solid var(--primary);
  box-shadow:var(--shadow-sm);
  position:sticky; top:0; z-index:200;
}
.pj-header-inner{
  max-width:1440px; margin:0 auto;
  padding:14px 28px;
  display:flex; align-items:center; gap:20px;
}
.pj-header-text{flex:1;}
.pj-header-text .rep{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px; font-weight:600; color:var(--text-muted);
  letter-spacing:2.5px; text-transform:uppercase;
  margin-bottom:2px;
}
.pj-header-text .org{
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px; font-weight:800;
  color:var(--primary);
  letter-spacing:0.5px; text-transform:uppercase;
  line-height:1.1;
}
.pj-header-text .juz{
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px; font-weight:600; color:var(--text-body);
  margin-top:2px;
}
.pj-header-badge{
  flex-shrink:0;
  background:var(--primary-light);
  border:1.5px solid rgba(165,32,32,0.15);
  border-radius:var(--radius-md);
  padding:10px 18px;
  text-align:center;
}
.header-sneed{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}
.header-sneed img{
  height:112px;
  width:auto;
  object-fit:contain;
}
.header-logo-img{
  height:156px;
  width:auto;
  object-fit:contain;
}
body.dark-mode .header-logo-img,
body.dark-mode .header-sneed img{
  background:#fff;
  border-radius:8px;
  padding:4px;
  box-shadow:0 0 0 1px rgba(255,255,255,0.15);
}
body.dark-mode .login-emblem{
  background:linear-gradient(135deg,#fff 0%,#f0f0f0 100%);
  box-shadow:0 8px 32px rgba(0,0,0,0.5), inset 0 2px 0 rgba(255,255,255,0.5);
}
.pj-header-badge .bt{
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px; font-weight:800;
  letter-spacing:1px; text-transform:uppercase;
  color:var(--primary-dark); white-space:nowrap;
}
.pj-header-badge .bs{
  font-size:10px; color:var(--primary);
  opacity:0.7; white-space:nowrap;
}
.header-user{
  display:flex; align-items:center; gap:12px;
  padding:8px 14px;
  background:linear-gradient(135deg,var(--primary-light),#FFF);
  border-radius:var(--radius-md);
  border:1px solid rgba(165,32,32,0.1);
}
.header-user .user-name{
  font-size:12px; font-weight:700;
  color:var(--primary-dark);
}
.header-user .logout-btn{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:var(--text-inverse);
  border:none;
  padding:6px 14px; border-radius:var(--radius-sm);
  font-size:11px; font-weight:700;
  font-family:'Barlow Condensed',sans-serif;
  letter-spacing:0.5px; text-transform:uppercase;
  cursor:pointer;
  transition:var(--trans-fast);
}
.header-user .logout-btn:hover{
  transform:scale(1.05);
  box-shadow:0 2px 8px rgba(165,32,32,0.3);
}
.dark-toggle{
  font-size:18px;
  padding:8px 12px;
  border-radius:var(--radius-md);
  cursor:pointer;
  transition:all var(--trans-normal);
}
.dark-toggle:hover{
  transform:scale(1.1);
}
.user-dropdown{
  position:absolute; top:100%; right:0;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius-md);
  box-shadow:var(--shadow-lg);
  min-width:180px;
  z-index:1000;
  margin-top:8px;
  overflow:hidden;
}
.user-menu-item{
  padding:12px 16px;
  cursor:pointer;
  font-size:13px;
  transition:background var(--trans-fast);
}
.user-menu-item:hover{background:var(--bg-elevated);}
.user-menu-item:first-child{border-bottom:1px solid var(--border);}

/* ========== RED BAND ========== */
.red-band{
  background:linear-gradient(90deg,var(--primary-dark) 0%,var(--primary) 50%,#8B1A1A 100%);
  padding:10px 28px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:107px; z-index:199;
}
.red-band-left{
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px; font-weight:600;
  color:rgba(255,255,255,0.9);
  letter-spacing:1.5px; text-transform:uppercase;
}
.red-band-right{display:flex; align-items:center; gap:12px;}
.btn-sync{
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.3);
  color:#fff;
  border-radius:20px;
  padding:6px 16px;
  font-size:12px; font-weight:700;
  font-family:'Barlow Condensed',sans-serif;
  letter-spacing:0.5px;
  cursor:pointer;
  transition:var(--trans-fast);
  display:flex; align-items:center; gap:8px;
}
.btn-sync:hover{background:rgba(255,255,255,0.25);}
.status-dot{
  width:8px; height:8px;
  border-radius:50%;
  background:#4ADE80;
  box-shadow:0 0 8px #4ADE80;
  display:inline-block;
}
.status-dot.offline{background:#F87171; box-shadow:none;}
.status-dot.syncing{background:#FBBF24; box-shadow:0 0 8px #FBBF24; animation:pulse-dot 1.2s infinite;}
.status-dot.synced{background:#4ADE80; box-shadow:0 0 8px #4ADE80;}
.status-dot.error{background:#F87171; box-shadow:0 0 8px #F87171;}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* ========== NAV TABS ========== */
.tabs-wrap{
  background:var(--bg-card);
  border-bottom:2px solid var(--border);
  position:sticky; top:153px; z-index:198;
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
}
.tabs-inner{
  max-width:1440px; margin:0 auto;
  display:flex;
  overflow-x:auto;
  scrollbar-width:none;
}
.tabs-inner::-webkit-scrollbar{display:none;}
.tab-btn{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px; font-weight:700;
  letter-spacing:0.5px; text-transform:uppercase;
  color:var(--text-muted);
  padding:14px 20px;
  border:none; background:none;
  cursor:pointer;
  border-bottom:3px solid transparent;
  white-space:nowrap;
  transition:var(--trans-fast);
  display:flex; align-items:center; gap:8px;
}
.tab-btn:hover{
  color:var(--primary);
  background:var(--primary-light);
}
.tab-btn.active{
  color:var(--primary);
  border-bottom-color:var(--primary);
  background:var(--primary-light);
}
.tab-num{
  background:var(--border);
  color:var(--text-muted);
  width:20px; height:20px;
  border-radius:50%;
  font-size:10px; font-weight:800;
  display:inline-flex; align-items:center; justify-content:center;
  transition:var(--trans-fast);
}
.tab-btn.active .tab-num{
  background:var(--primary);
  color:var(--text-inverse);
}

/* ========== MAIN ========== */
#app{max-width:1440px; margin:0 auto; padding:24px 28px 48px;}
.panel{display:none;}
.panel.active{display:block; animation:fadeUp 0.25s ease;}
@keyframes fadeUp{
  from{opacity:0; transform:translateY(8px);}
  to{opacity:1; transform:translateY(0);}
}

/* ========== SECTION TITLE ========== */
.sec-title{
  display:flex; align-items:center; gap:14px;
  margin-bottom:24px;
}
.sec-title-bar{
  width:5px; height:36px;
  background:linear-gradient(180deg,var(--primary),var(--primary-dark));
  border-radius:3px; flex-shrink:0;
}
.sec-title h2{
  font-family:'Barlow Condensed',sans-serif;
  font-size:24px; font-weight:800;
  color:var(--text-heading);
  text-transform:uppercase; letter-spacing:0.5px;
}
.sec-title p{
  font-size:12px; color:var(--text-muted);
  margin-top:2px;
}

/* ========== CARDS ========== */
.card{
  background:var(--bg-card);
  border-radius:var(--radius-lg);
  box-shadow:0 2px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
  border:1px solid var(--border);
  overflow:hidden;
  margin-bottom:20px;
  transition:all var(--trans-normal);
  position:relative;
}
.card::before{
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg,var(--primary),var(--primary-dark),var(--primary));
  opacity:0;
  transition:opacity var(--trans-normal);
}
.card:hover{box-shadow:0 8px 24px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06); transform:translateY(-2px);}
.card:hover::before{opacity:1;}
.card-header{
  background:linear-gradient(90deg,#1E3A5F,#2563EB);
  padding:14px 20px;
}
.card-header h3{
  font-family:'Barlow Condensed',sans-serif;
  font-size:15px; font-weight:800;
  color:var(--text-inverse);
  text-transform:uppercase; letter-spacing:0.5px;
}
.card-body{padding:18px 20px;}

/* ========== KPI STATS ========== */
.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:12px;
  margin-bottom:20px;
}
.stat-box{
  background:var(--bg-card);
  border-radius:var(--radius-md);
  padding:14px 12px;
  border:1px solid var(--border);
  box-shadow:var(--shadow-xs);
  transition:all var(--trans-normal);
  position:relative; overflow:hidden;
  cursor:pointer;
  min-width:0;
}
.stat-box::before{
  content:''; position:absolute;
  top:-2px; right:-2px;
  width:40px; height:40px;
  background:linear-gradient(135deg,rgba(165,32,32,0.08),transparent);
  border-radius:50%;
  pointer-events:none;
}
.stat-box:hover{
  transform:translateY(-4px);
  box-shadow:var(--shadow-md);
  border-color:transparent;
}
.stat-box.azul{border-top:3px solid var(--accent-blue);}
.stat-box.verde{border-top:3px solid var(--accent-green);}
.stat-box.naranja{border-top:3px solid var(--accent-amber);}
.stat-box.dorado{border-top:3px solid #B45309;}
.stat-box.purple{border-top:3px solid #7C3AED;}
.stat-box.rojo{border-top:3px solid #DC2626;}
.stat-box.teal{border-top:3px solid #0D9488;}
.stat-box.cyan{border-top:3px solid #0891B2;}
.stat-box.rosa{border-top:3px solid #DB2777;}
.stat-box.indigo{border-top:3px solid #4F46E5;}
.stat-icon{
  font-size:18px; margin-bottom:4px;
}
.stat-num{
  font-family:'Barlow Condensed',sans-serif;
  font-size:28px; font-weight:800;
  color:var(--text-heading);
  line-height:1.1; margin-bottom:2px;
  word-break:break-word;
  overflow-wrap:anywhere;
}
.stat-num.currency{
  font-size:20px;
  line-height:1.15;
}
.stat-label{
  font-size:11px; font-weight:600;
  color:var(--text-muted);
  text-transform:uppercase; letter-spacing:0.5px;
}

/* ========== BADGES ========== */
.badge{
  display:inline-flex; align-items:center;
  padding:4px 10px;
  border-radius:20px;
  font-size:11px; font-weight:700;
  letter-spacing:0.3px;
}
.badge-azul{background:#EFF6FF; color:#1D4ED8;}
.badge-verde{background:#ECFDF5; color:#047857;}
.badge-rojo{background:#FEF2F2; color:#B91C1C;}
.badge-amber{background:#FFFBEB; color:#B45309;}
.badge-gris{background:#F3F4F6; color:#374151;}
.badge-purple{background:#F5F3FF; color:#5B21B6;}
.badge-navy{background:#EFF6FF; color:#1E3A5F;}

/* ========== TABLES ========== */
.tbl-wrap{overflow-x:auto; border-radius:var(--radius-md);}
table{width:100%; border-collapse:collapse;}
thead th{
  background:linear-gradient(90deg,var(--primary-dark),var(--primary));
  color:var(--text-inverse);
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px; font-weight:700;
  text-transform:uppercase; letter-spacing:0.5px;
  padding:12px 14px; text-align:left; white-space:nowrap;
}
thead th:first-child{border-radius:var(--radius-md) 0 0 0;}
thead th:last-child{border-radius:0 var(--radius-md) 0 0;}
tbody tr{
  border-bottom:1px solid var(--border);
  transition:background var(--trans-fast);
}
tbody tr:hover{background:#F8FAFF;}
tbody td{
  padding:11px 14px; font-size:13px;
  color:var(--text-body);
}
tbody tr:nth-child(even){background:#FAFAFA;}
tbody tr:nth-child(even):hover{background:#F0F4FF;}
tbody tr.dragging{opacity:0.5; background:#FEF3C7;}
tbody tr.drag-over{border-top:3px solid var(--primary); background:#FEF9C3;}
.tbl-empty{
  text-align:center; padding:48px 20px;
  color:var(--text-muted);
}
.tbl-empty-icon{font-size:40px; opacity:0.4; margin-bottom:8px;}

/* ========== SEARCH ========== */
.search-exp-wrap{
  background:linear-gradient(135deg,#F0F9FF,#EFF6FF);
  border:1px solid #BFDBFE;
  border-left:5px solid #0369A1;
  border-radius:var(--radius-lg);
  padding:18px 22px; margin-bottom:20px;
}
.search-exp-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px; font-weight:800;
  color:#0369A1; text-transform:uppercase; letter-spacing:0.5px;
  margin-bottom:12px;
}
.search-row{display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap;}
input[type="text"],input[type="date"],input[type="number"],input[type="time"],select,textarea{
  font-family:'Barlow',sans-serif; font-size:14px;
  padding:10px 14px;
  border:1.5px solid var(--border);
  border-radius:var(--radius-md);
  color:var(--text-body); background:var(--bg-card);
  transition:var(--trans-fast); width:100%;
}
input:focus,select:focus,textarea:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 3px var(--primary-glow);
}

/* ========== BUTTONS ========== */
.btn{
  display:inline-flex; align-items:center; gap:8px;
  padding:10px 20px;
  border-radius:var(--radius-md);
  font-size:13px; font-weight:700;
  cursor:pointer; border:none;
  transition:var(--trans-fast);
  font-family:'Barlow',sans-serif;
}
.btn-primary{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:var(--text-inverse);
}
.btn-primary:hover{
  transform:translateY(-2px);
  box-shadow:0 4px 12px rgba(165,32,32,0.35);
}
.btn-secondary{
  background:var(--bg-card);
  color:var(--text-body);
  border:1.5px solid var(--border);
}
.btn-secondary:hover{background:var(--bg-elevated); border-color:var(--text-muted);}
.btn-success{background:linear-gradient(135deg,var(--accent-green),#047857); color:var(--text-inverse);}
.btn-success:hover{filter:brightness(1.1);}
.btn-danger{background:linear-gradient(135deg,#DC2626,#991B1B); color:#fff;}
.btn-danger:hover{filter:brightness(1.1); transform:translateY(-1px);}

/* ========== FORMS ========== */
.form-group{display:flex; flex-direction:column; gap:5px;}
.form-group label{
  font-size:11px; font-weight:700;
  color:var(--text-muted);
  text-transform:uppercase; letter-spacing:0.5px;
}
.form-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:14px;
}

/* ========== MODAL ========== */
.modal-overlay{
  position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(26,26,46,0.6);
  backdrop-filter:blur(4px);
  z-index:1000;
  display:flex; align-items:center; justify-content:center;
  padding:24px;
}
.modal{
  background:var(--bg-card);
  border-radius:var(--radius-xl);
  max-width:920px; width:100%;
  max-height:90vh; overflow-y:auto;
  box-shadow:var(--shadow-xl);
  animation:modalIn 0.25s ease;
}
@keyframes modalIn{
  from{opacity:0; transform:scale(0.95) translateY(10px);}
  to{opacity:1; transform:scale(1) translateY(0);}
}
.modal-header{
  background:linear-gradient(135deg,var(--primary-dark),var(--primary));
  padding:18px 24px;
  display:flex; align-items:center; justify-content:space-between;
}
.modal-header h3{
  font-family:'Barlow Condensed',sans-serif;
  font-size:18px; font-weight:800;
  color:var(--text-inverse);
  text-transform:uppercase;
}
.modal-close{
  background:rgba(255,255,255,0.2);
  border:none; border-radius:50%;
  width:34px; height:34px;
  color:#fff; font-size:18px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:var(--trans-fast);
}
.modal-close:hover{background:rgba(255,255,255,0.3);}
.modal-body{padding:24px;}
.modal-footer{
  padding:18px 24px;
  border-top:1px solid var(--border);
  display:flex; justify-content:flex-end; gap:12px;
}

/* ========== NOTIFICATIONS ========== */
.notif-container{
  position:fixed; top:24px; right:24px;
  z-index:9999;
  display:flex; flex-direction:column; gap:10px;
}
.notif{
  background:var(--bg-card);
  padding:14px 18px;
  border-radius:var(--radius-md);
  box-shadow:var(--shadow-lg);
  display:flex; align-items:center; gap:10px;
  min-width:300px;
  animation:slideIn 0.25s ease;
  border-left:4px solid var(--accent-blue);
}
.notif.success{border-left-color:var(--accent-green);}
.notif.error{border-left-color:var(--accent-rose);}
.notif.warn{border-left-color:var(--accent-amber);}
.notif.info{border-left-color:var(--accent-blue);}
@keyframes slideIn{
  from{transform:translateX(100%); opacity:0;}
  to{transform:translateX(0); opacity:1;}
}

/* ========== CHARTS ========== */
.chart-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:14px; margin-bottom:20px;
}
.chart-box{
  background:var(--bg-card);
  border-radius:var(--radius-lg);
  padding:14px;
  border:1px solid var(--border);
  box-shadow:var(--shadow-xs);
  transition:all var(--trans-normal);
  position:relative;
  overflow:hidden;
}
.chart-box:hover{
  box-shadow:var(--shadow-md);
  transform:translateY(-2px);
  border-color:rgba(165,32,32,0.15);
}
.chart-box::before{
  content:''; position:absolute;
  top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg,var(--primary),var(--accent-blue),var(--accent-green),var(--accent-amber),var(--accent-purple));
  opacity:0.6;
}
body.dark-mode .chart-box::before{opacity:0.4;}
.chart-box canvas{
  display:block;
  width:300px;
  height:190px;
  margin:0 auto;
}
.chart-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px; font-weight:700;
  color:var(--text-heading);
  text-transform:uppercase;
  margin-bottom:14px;
  display:flex; align-items:center; gap:8px;
  letter-spacing:0.5px;
}

/* ========== EXP DETAIL ========== */
.exp-header{
  background:linear-gradient(135deg,#FFFFFF 0%,#F0F9FF 100%);
  border:1px solid #BAE6FD;
  border-left:5px solid #0369A1;
  border-radius:var(--radius-md);
  padding:22px 26px; margin-bottom:20px;
  display:flex; align-items:flex-start; justify-content:space-between;
  flex-wrap:wrap; gap:16px;
}
.exp-num{
  font-family:'Barlow Condensed',sans-serif;
  font-size:26px; font-weight:800;
  color:#0369A1; letter-spacing:1.5px;
}
.exp-details-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:14px;
  background:#F8FAFF;
  border-radius:var(--radius-md);
  padding:20px;
  border:1px solid #BFDBFE;
}
.exp-field{
  background:#fff;
  border:1px solid #E0E7FF;
  border-top:3px solid #6366F1;
  border-radius:var(--radius-sm);
  padding:13px 15px;
  box-shadow:var(--shadow-xs);
  transition:var(--trans-fast);
}
.exp-field:hover{
  box-shadow:var(--shadow-sm);
  transform:translateY(-2px);
}
.exp-field label{
  font-size:10px; font-weight:700;
  text-transform:uppercase; letter-spacing:0.8px;
  color:#6366F1; margin-bottom:5px;
  display:block;
}
.exp-field span{
  font-size:13px; color:var(--text-body);
  font-weight:500;
}

/* ========== SESSION WARNING ========== */
.session-warning{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:linear-gradient(135deg,#FFFBEB,#FFF);
  border:2px solid var(--accent-amber);
  padding:14px 28px; border-radius:var(--radius-lg);
  font-weight:600; color:#92400E;
  z-index:9999;
  display:flex; align-items:center; gap:14px;
  box-shadow:var(--shadow-lg);
}

/* ========== EMPTY STATE ========== */
.empty-state{text-align:center; padding:64px 24px; color:var(--text-muted);}
.empty-state-icon{font-size:52px; opacity:0.35; margin-bottom:14px;}

/* ========== RESPONSIVE ========== */
@media(max-width:768px){
  #app{padding:16px 14px 40px;}
  .stats-grid{grid-template-columns:repeat(2,1fr); gap:12px;}
  .red-band-left{display:none;}
  .form-grid{grid-template-columns:1fr;}
  .login-card{padding:36px 28px; margin:16px;}
  .pj-header-inner{padding:12px 16px;}
}
</style>
</head>
<body>
<div id="app">

  <!-- LOGIN SCREEN -->
  <div v-if="!isLoggedIn" class="login-screen">
    <div class="login-card">
      <div class="login-emblem"><img src="logopj.png" alt="Poder Judicial"></div>
      <div class="login-org">Poder Judicial del Peru</div>
      <div class="login-court">1º Juzgado Permanente</div>
      <div class="login-subtitle">Extincion de Dominio</div>
      <h2 class="login-title">Iniciar Sesion</h2>
      <div class="login-input-group">
        <input type="text" class="login-input" v-model="loginUsuario" @keyup.enter="doLogin" placeholder="Usuario (Ej: JUAN PEREZ)"
          style="text-transform:uppercase; margin-bottom:10px;">
      </div>
      <div class="login-input-group">
        <input type="password" class="login-input" v-model="loginPassword"
          @keyup.enter="doLogin" placeholder="Contraseña">
      </div>
      <button class="login-btn" @click="doLogin" :disabled="loginAttempts >= 5 || !loginUsuario.trim()">
        {{ loginAttempts >= 5 ? 'Bloqueado' : 'Ingresar' }}
      </button>
      <div v-if="loginError" class="login-error">{{ loginError }}</div>
      <div v-if="loginAttempts >= 5" class="locked-msg">
        Demasiados intentos. Bloqueado por {{ Math.ceil((lockoutUntil - Date.now()) / 60000) }} min.
        <a href="#" @click.prevent="desbloquearLogin" style="display:block;margin-top:6px;color:var(--accent-blue);font-size:12px;text-decoration:underline;">Desbloquear ahora (admin)</a>
      </div>
      <div v-else style="text-align:center;margin-top:8px;">
        <a href="#" @click.prevent="resetPasswordEmergencia" style="color:var(--text-muted);font-size:12px;text-decoration:underline;">Olvidaste la contrasena?</a>
      </div>
      <div class="login-remember">
        <input type="checkbox" id="rememberMe" v-model="rememberDevice">
        <label for="rememberMe">Recordar dispositivo</label>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <template v-else>

    <!-- HEADER -->
    <header class="pj-header">
      <div class="pj-header-inner">
        <div class="header-logo">
          <img src="logopj.png" alt="PJ" class="header-logo-img">
        </div>
        <div class="pj-header-text">
          <div class="rep">Poder Judicial del Peru</div>
          <div class="org">1º Juzgado Permanente</div>
          <div class="juz">Especializado en Extincion de Dominio</div>
        </div>
        <div class="header-sneed">
          <img src="logo SNEEDOK.png" alt="SNEED - Subsistema Nacional Especializado en Extincion de Dominio">
        </div>
        <div class="pj-header-badge">
          <div class="bt">Sistema de Gestion</div>
          <div class="bs">v4.0 Sheets</div>
        </div>
        <button class="btn btn-secondary dark-toggle" @click="toggleDarkMode" :title="darkMode ? 'Modo claro' : 'Modo oscuro'">
          {{ darkMode ? '☀️' : '🌙' }}
        </button>
        <div class="header-user" style="position:relative;">
          <div class="user-name" @click="showUserMenu = !showUserMenu" style="cursor:pointer;">{{ usuario }} ▼</div>
          <div v-if="showUserMenu" class="user-dropdown">
            <div @click="toggleNotificacionesPush" class="user-menu-item">
              {{ notifPushEnabled ? '🔕 Desactivar notificaciones' : '🔔 Activar notificaciones' }}
              <span v-if="notifPushEnabled" style="color:var(--accent-green);font-size:11px;margin-left:auto;">ON</span>
            </div>
            <div @click="configurarSheets" class="user-menu-item">📡 Configurar Google Sheets</div>
            <div v-if="sheetsUrl" @click="syncDown" class="user-menu-item">⬇️ Sincronizar desde Sheets</div>
            <div v-if="sheetsUrl" @click="syncUp" class="user-menu-item">⬆️ Subir datos a Sheets</div>
            <div v-if="sheetsUrl" @click="toggleAutoSync" class="user-menu-item">
              {{ autoSyncEnabled ? '🔕 Desactivar sync automática' : '🔔 Activar sync automática' }}
              <span v-if="autoSyncEnabled" style="color:var(--accent-green);font-size:11px;margin-left:auto;">{{ autoSyncInterval }}min</span>
            </div>
            <hr style="border:none;border-top:1px solid var(--border);margin:6px 0;">
            <div class="user-menu-item" @click="exportJSON">💾 Exportar para otra PC (JSON)</div>
            <label class="user-menu-item" style="cursor:pointer;margin:0;">📂 Importar desde otra PC (JSON)
              <input type="file" accept=".json" @change="importJSON" style="display:none;">
            </label>
            <div v-if="isAdmin" @click="abrirModalAdmin" class="user-menu-item">🛡️ Panel de Administracion</div>
            <div @click="openChangePassword" class="user-menu-item">🔑 Cambiar contraseña</div>
            <div @click="logout" class="user-menu-item">🚪 Cerrar sesión</div>
          </div>
        </div>
      </div>
    </header>

    <!-- RED BAND -->
    <div class="red-band">
      <div class="red-band-left">
        Expedientes: {{ expedientes.length }} | Audiencias: {{ audiencias.length }} | Usuario: {{ usuario }}
      </div>
      <div class="red-band-center" style="display:flex;align-items:center;gap:8px;">
        <span v-if="pendingChanges > 0" class="badge badge-amber" style="font-size:10px;padding:3px 8px;">✏️ {{ pendingChanges }} cambios pendientes</span>
        <span v-if="lastSync" class="badge badge-navy" style="font-size:10px;padding:3px 8px;">🕒 {{ lastSync }}</span>
      </div>
      <div class="red-band-right">
        <button class="btn btn-secondary" style="background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);color:#fff;" @click="exportJSON" title="Exportar JSON">
          📤 JSON
        </button>
        <label class="btn btn-secondary" style="background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);color:#fff;cursor:pointer;" title="Importar JSON">
          📥 JSON
          <input type="file" accept=".json" @change="importJSON" style="display:none;">
        </label>
        <button class="btn btn-secondary" style="background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);color:#fff;" @click="exportExcel" title="Exportar Excel">
          📤 Excel
        </button>
        <label class="btn btn-secondary" style="background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);color:#fff;cursor:pointer;" title="Importar Excel">
          📥 Excel
          <input type="file" accept=".csv,.xlsx" @change="importExcel" style="display:none;">
        </label>
        <button class="btn-sync" @click="syncDown" title="Descargar desde Sheets">
          <span class="status-dot" :class="{ offline: !sheetsUrl, syncing: syncStatus === 'syncing' }"></span>
          {{ sheetsUrl ? (syncStatus === 'syncing' ? 'Sync...' : '⬇️ Sheets') : 'Sin Sheets' }}
        </button>
        <button class="btn-sync" @click="syncUp" title="Subir a Sheets" v-if="sheetsUrl">
          <span class="status-dot" :class="{ syncing: syncStatus === 'syncing' }"></span>
          {{ syncStatus === 'syncing' ? 'Sync...' : '⬆️ Sheets' }}
        </button>
        <button class="btn-sync" @click="configurarSheets" title="Configurar Sheets">
          ⚙️
        </button>
      </div>
    </div>

    <!-- TABS -->
    <nav class="tabs-wrap">
      <div class="tabs-inner">
        <button v-for="(tab, i) in tabs" :key="i"
          class="tab-btn" :class="{ active: tabActivo === i }"
          @click="selectTab(i)">
          {{ tab.icon }} {{ tab.nombre }}
          <span class="tab-num">{{ tab.count }}</span>
        </button>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main>
      <!-- TAB 0: ESTADISTICA -->
      <section v-show="tabActivo === 0" class="panel active">
        <div class="sec-title">
          <div class="sec-title-bar"></div>
          <div>
            <h2>Panel Estadístico</h2>
            <p>Haga clic en cualquier indicador o gráfico para ver el detalle de expedientes</p>
          </div>
        </div>
        <div class="stats-grid">
          <div class="stat-box" :class="k.color" v-for="(k, i) in kpis" :key="i" @click="mostrarListaKPI(k)">
            <div class="stat-icon">{{ k.icon }}</div>
            <div class="stat-num" :class="{ currency: k.isCurrency }">{{ k.isCurrency ? (k.currency + ' ' + k.cantidad.toLocaleString('es-PE')) : k.cantidad }}</div>
            <div class="stat-label">{{ k.label }}</div>
          </div>
        </div>
        <div class="card" style="margin-bottom:20px;">
          <div class="card-body" style="display:flex; gap:20px; align-items:center; flex-wrap:wrap;">
            <div style="font-size:13px; color:var(--text-body); flex:1;">
              <strong>Indicadores activos:</strong> Haga clic en cualquier caja de arriba para listar los expedientes. Los gráficos de abajo también son clicables: seleccione una barra para filtrar expedientes por esa categoría.
            </div>
          </div>
        </div>
        <div class="chart-container">
          <div class="chart-box">
            <div class="chart-title">📊 Expedientes por Asunto</div>
            <canvas id="chartAsunto" width="300" height="190"></canvas>
          </div>
          <div class="chart-box">
            <div class="chart-title">📅 Ingresos por Año</div>
            <canvas id="chartAnios" width="300" height="190"></canvas>
          </div>
          <div class="chart-box">
            <div class="chart-title">🏷️ Distribucion por Estado</div>
            <canvas id="chartEstado" width="300" height="190"></canvas>
          </div>
          <div class="chart-box">
            <div class="chart-title">⚖️ Distribucion por Resultado</div>
            <canvas id="chartResultado" width="300" height="190"></canvas>
          </div>
          <div class="chart-box">
            <div class="chart-title">🏛️ Top Fiscalias</div>
            <canvas id="chartBienes" width="300" height="190"></canvas>
          </div>
          <div class="chart-box">
            <div class="chart-title">📈 Tendencia por Mes</div>
            <canvas id="chartTendencia" width="300" height="190"></canvas>
          </div>
        </div>
      </section>

      <!-- TAB 1: SENTENCIAS 2ª INSTANCIA -->
      <section v-show="tabActivo === 1" class="panel active">
        <div class="sec-title">
          <div class="sec-title-bar"></div>
          <div>
            <h2>Sentencias 2ª Instancia</h2>
            <p>Registro de sentencias en apelacion</p>
          </div>
        </div>
        <div class="search-exp-wrap">
          <div class="search-exp-title">Filtrar Resultados</div>
          <div class="search-row">
            <div class="form-group">
              <label>Anio</label>
              <select v-model="filtros.anio">
                <option value="">Todos</option>
                <option v-for="anio in aniosDisponibles" :key="anio" :value="anio">{{ anio }}</option>
              </select>
            </div>
            <div class="form-group">
              <label>Estado</label>
              <select v-model="filtros.estado">
                <option value="">Todos</option>
                <option v-for="est in estadosUnicos" :key="est" :value="est">{{ est }}</option>
              </select>
            </div>
            <div class="form-group">
              <label>Resultado</label>
              <select v-model="filtros.resultado">
                <option value="">Todos</option>
                <option value="FUNDADO">FUNDADO</option>
                <option value="INFUNDADO">INFUNDADO</option>
                <option value="IMPRECISO">IMPRECISO</option>
              </select>
            </div>
            <div class="form-group">
              <label>Buscar texto</label>
              <input type="text" v-model="filtros.texto" placeholder="En asunto, delito...">
            </div>
            <button class="btn btn-secondary" @click="filtros = {anio:'',estado:'',resultado:'',texto:''}">Limpiar</button>
          </div>
        </div>
        <div class="card">
          <div class="card-body">
            <div class="tbl-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Numero</th>
                    <th>Fecha</th>
                    <th>Asunto</th>
                    <th>Estado</th>
                    <th>Resultado</th>
                    <th>Fiscalia</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="exp in filteredSentencias" :key="exp.num" @click="verExpediente(exp)" style="cursor:pointer">
                    <td><strong>{{ exp.num }}</strong></td>
                    <td>{{ fmtFecha(exp.fecha) }}</td>
                    <td>{{ exp.asunto }}</td>
                    <td><span class="badge" :class="getBadgeClass(exp.estado)">{{ exp.estado }}</span></td>
                    <td><span class="badge" :class="getBadgeResultado(exp.resultado)">{{ exp.resultado || '-' }}</span></td>
                    <td>{{ exp.fiscalia }}</td>
                  </tr>
                </tbody>
              </table>

          <div class="form-group" style="margin-bottom:14px;">
            <label>URL del Web App de Google Apps Script</label>
            <input type="text" v-model="sheetsUrlInput" placeholder="https://script.google.com/macros/s/XXXXXXXX/exec">
            <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">
              Copia aqui la URL de implementacion del Web App (Deploy &gt; New deployment &gt; Web app).
            </div>
          </div>
          <div class="form-group">
            <label>Estado de sincronizacion</label>
            <div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg-elevated);border-radius:var(--radius-md);border:1px solid var(--border);">
              <span class="status-dot" :class="{ offline: !sheetsUrl, synced: syncStatus === 'synced', error: syncStatus === 'error', syncing: syncStatus === 'syncing' }"></span>
              <span style="font-size:13px;">
                {{ syncStatus === 'offline' ? 'Sin configurar' : syncStatus === 'syncing' ? 'Sincronizando...' : syncStatus === 'synced' ? 'Sincronizado' : syncStatus === 'error' ? 'Error' : 'Desconocido' }}
              </span>
              <span v-if="lastSync" style="font-size:11px;color:var(--text-muted);margin-left:auto;">Ultima: {{ lastSync }}</span>
            </div>
          </div>
          <div style="margin-top:14px;padding:12px;background:var(--primary-light);border-radius:var(--radius-md);border:1px solid var(--primary-glow);">
            <strong style="font-size:12px;color:var(--primary);">Instrucciones rapidas:</strong>
            <ol style="font-size:11px;color:var(--text-muted);margin-top:6px;padding-left:16px;line-height:1.6;">
              <li>Abre el codigo fuente de esta pagina y busca "GOOGLE APPS SCRIPT CODE".</li>
              <li>Ve a <a href="https://script.google.com" target="_blank" style="color:var(--accent-blue);">script.google.com</a> y crea un proyecto nuevo.</li>
              <li>Pega el codigo, guarda y despliega como Web App (acceso: Cualquiera).</li>
              <li>Copia la URL del Web App aqui arriba.</li>
            </ol>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" @click="modalSheets=false">Cancelar</button>
          <button class="btn btn-danger" @click="sheetsUrlInput='';guardarSheetsConfig()" v-if="sheetsUrl">Desvincular</button>
          <button class="btn btn-primary" @click="guardarSheetsConfig">Guardar</button>
        </div>
      </div>
    </div>

          <button class="modal-close" @click="kpiModal=false">×</button>
        </div>
        <div class="modal-body" style="max-height:60vh;overflow-y:auto;">

            <table>
              <thead>
                <tr>
                  <th>Numero</th>
                  <th>Fecha</th>
                  <th>Asunto</th>
                  <th>Estado</th>
                  <th>Fiscalia</th>
                  <th>Delito</th>
                  <th>Demandados</th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="exp in kpiModalLista" :key="exp.num" @click="verExpediente(exp)" style="cursor:pointer">
                  <td><strong>{{ exp.num }}</strong></td>
                  <td>{{ fmtFecha(exp.fecha) }}</td>
                  <td>{{ exp.asunto }}</td>
                  <td><span class="badge" :class="getBadgeClass(exp.estado)">{{ exp.estado }}</span></td>
                  <td>{{ exp.fiscalia || '-' }}</td>
                  <td>{{ exp.delito || '-' }}</td>
                  <td>{{ exp.demandados || '-' }}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" @click="kpiModal=false">Cerrar</button>
        </div>
      </div>
    </div>

  </template>

    async function doLogin() {
      if (!loginUsuario.value.trim()) { loginError.value = 'Ingrese su nombre de usuario'; return; }
      if (loginAttempts.value >= 5 && Date.now() < lockoutUntil.value) return;

      const hash = await hashPassword(loginPassword.value);
      const storedHash = localStorage.getItem('pj_password_hash') || DEFAULT_HASH;

      if (hash === storedHash) {
        isLoggedIn.value = true;
        loginError.value = '';
        loginAttempts.value = 0;
        const nombre = loginUsuario.value.trim().toUpperCase();
        usuario.value = nombre;
        localStorage.setItem('pj_usuario_nombre', nombre);
        localStorage.setItem('pj_login_usuario', nombre);

        if (rememberDevice.value) {
          localStorage.setItem('pj_device_token', generateToken());
          localStorage.setItem('pj_usuario_nombre', nombre);
        }

        startSessionTimer();
        await loadData();
        nextTick(() => setTimeout(drawAllCharts, 400));

        checkAdmin();
      } else {
        loginAttempts.value++;
        loginError.value = 'Contraseña incorrecta';

        if (loginAttempts.value >= 5) {
          lockoutUntil.value = Date.now() + 5 * 60 * 1000;
          loginError.value = 'Demasiados intentos. Bloqueado por 5 min.';
        }
      }
      loginPassword.value = '';
    }

    function checkAdmin() {
      const storedAdmin = localStorage.getItem('pj_admin_users');
      if (storedAdmin) {

        isAdmin.value = admins.includes(usuario.value);
      } else {
        isAdmin.value = false;
      }
    }

            clearInterval(interval);
          }
        }, 1000);
      }, SESSION_TIMEOUT - WARNING_BEFORE);

    async function confirmarPassword(mensaje) {
      const password = prompt(mensaje || 'Ingrese su contraseña para confirmar la accion');
      if (!password) return false;
      const hash = await hashPassword(password);
      const storedHash = localStorage.getItem('pj_password_hash') || DEFAULT_HASH;
      if (hash === storedHash) return true;
      notif('Contraseña incorrecta. Operacion cancelada.', 'error');
      return false;
    }

    async function hashPassword(password) {
      const msg = new TextEncoder().encode(password + 'PJ_SALT_2024');
      const hashBuffer = await crypto.subtle.digest('SHA-256', msg);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function generateToken() {
      return Math.random().toString(36).substring(2) + Date.now().toString(36);

    async function changePassword() {
      passwordError.value = '';
      passwordSuccess.value = '';

      if (!passwordForm.value.actual || !passwordForm.value.nueva || !passwordForm.value.confirmar) {
        passwordError.value = 'Complete todos los campos';
        return;
      }

      if (passwordForm.value.nueva !== passwordForm.value.confirmar) {
        passwordError.value = 'La nueva contraseña no coincide';
        return;
      }

      if (passwordForm.value.nueva.length < 4) {
        passwordError.value = 'La contraseña debe tener al menos 4 caracteres';
        return;
      }

      const hashActual = await hashPassword(passwordForm.value.actual);
      const storedHash = localStorage.getItem('pj_password_hash') || DEFAULT_HASH;

      if (hashActual !== storedHash) {
        passwordError.value = 'Contraseña actual incorrecta';
        return;
      }

      const hashNuevo = await hashPassword(passwordForm.value.nueva);
      localStorage.setItem('pj_password_hash', hashNuevo);
      passwordSuccess.value = 'Contrasena actualizada correctamente!';
      notif('Contrasena cambiada exitosamente', 'success');
      setTimeout(() => { modalPassword.value = false; }, 1500);
    }

    // ========== PUSH NOTIFICATIONS ==========
    function checkNotificacionesPush() {
      if (typeof Notification !== 'undefined') {
        notifPushPermiso.value = Notification.permission;
        if (Notification.permission === 'granted' && notifPushEnabled.value) {
          notifPushEnabled.value = true;
        }
      }
    }

    async function toggleNotificacionesPush() {
      if (typeof Notification === 'undefined') {
        notif('Tu navegador no soporta notificaciones', 'warn');
        return;
      }
      if (Notification.permission === 'denied') {
        notif('Las notificaciones estan bloqueadas. Activalas en la configuracion del navegador.', 'error');
        return;
      }
      if (Notification.permission !== 'granted') {
        const perm = await Notification.requestPermission();
        notifPushPermiso.value = perm;
        if (perm !== 'granted') {
          notif('Permiso de notificaciones denegado', 'warn');
          return;
        }
      }
      notifPushEnabled.value = !notifPushEnabled.value;
      localStorage.setItem('pj_notif_push', notifPushEnabled.value);
      if (notifPushEnabled.value) {
        notif('Notificaciones push activadas', 'success');
        mostrarNotificacionPush('Sistema PJ', 'Notificaciones activadas. Recibiras alertas de plazos y audiencias.');
      } else {
        notif('Notificaciones push desactivadas', 'info');
      }
    }

    function mostrarNotificacionPush(titulo, cuerpo, icono = null) {
      if (!notifPushEnabled.value || typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
      try {
        new Notification(titulo, {
          body: cuerpo,
          icon: icono || 'logopj.png',
          badge: 'logopj.png',
          tag: 'pj-' + Date.now(),
          requireInteraction: false
        });
      } catch (e) {
        console.warn('No se pudo mostrar notificacion push:', e);
      }
    }

    function checkPlazosYAudiencias() {
      if (!notifPushEnabled.value || Notification.permission !== 'granted') return;
      const hoy = new Date();
      const hoyStr = hoy.toISOString().split('T')[0];

      // Plazos vencidos
      const vencidos = expedientes.value.filter(e => {
        if (!e.fechaVencimiento || e.estado === 'Archivado' || e.estado === 'Finalizado') return false;
        return e.fechaVencimiento < hoyStr;
      });
      if (vencidos.length > 0) {
        mostrarNotificacionPush(
          'Plazos vencidos',
          `${vencidos.length} expediente(s) tienen plazo procesal vencido.`,
          null
        );
      }

      // Audiencias para mañana
      const manana = new Date(hoy);
      manana.setDate(manana.getDate() + 1);
      const mananaStr = manana.toISOString().split('T')[0];
      const audienciasManana = audiencias.value.filter(a => a.fecha === mananaStr && a.estado === 'Programada');
      if (audienciasManana.length > 0) {
        mostrarNotificacionPush(
          'Audiencias programadas',
          `Manana tienes ${audienciasManana.length} audiencia(s) programada(s).`,
          null
        );
      }

      // Expedientes prioritarios en tramite
      const prioritarios = expedientes.value.filter(e => e.prioritario === 'SI' && (e.estado === 'En Tramite' || e.estado === 'En proceso'));
      if (prioritarios.length > 0 && Math.random() < 0.3) {
        mostrarNotificacionPush(
          'Expedientes prioritarios',
          `${prioritarios.length} expediente(s) prioritario(s) en tramite.`,
          null
        );
      }
    }

    function getBadgeClass(estado) {

      const e = estado.toUpperCase();
      if (e.includes('ARCHIVO')) return 'badge-gris';
      if (e.includes('FINALIZ') || e.includes('CONCLU')) return 'badge-verde';
      if (e.includes('EN PROCES') || e.includes('EN TR')) return 'badge-azul';
      if (e.includes('PLAZO VENCIDO')) return 'badge-rojo';
      if (e.includes('PENDIENTE')) return 'badge-amber';
      return 'badge-gris';
    }

      if (estado === 'Realizada') return 'badge-verde';

      return d;

    async function loadData() {
      // 1. PRIMERO intentar cargar desde localStorage (datos mas recientes del usuario)
      try {
        const stored = localStorage.getItem('pj_expedientes');
        if (stored && stored !== '[]') {
          const parsed = JSON.parse(stored);
          if (parsed && parsed.length > 0) {
            expedientes.value = parsed;
            migrarValorAMonto();
            loadAudiencias();
            notif('Datos cargados desde memoria local (' + parsed.length + ' expedientes)', 'success');
            if (tabActivo.value === 0) {
              nextTick(() => setTimeout(drawAllCharts, 300));
            }
            return;
          }
        }
      } catch(e) { console.warn('Error cargando desde localStorage:', e); }

      // 2. Si no hay localStorage, cargar DATOS_INICIALES (inline_data_v4.js - datos oficiales del sistema)
      if (typeof DATOS_INICIALES !== 'undefined' && DATOS_INICIALES && DATOS_INICIALES.length > 0) {
        const inicial = DATOS_INICIALES.map(e => ({
          ...e,
          version: e.version || 1,
          modificadoPor: e.modificadoPor || 'Sistema'
        }));
        expedientes.value = inicial;
        migrarValorAMonto();
        saveData();
        notif('✓ ' + inicial.length + ' expedientes cargados', 'success');
        loadAudiencias();
        if (tabActivo.value === 0) {
          nextTick(() => setTimeout(drawAllCharts, 300));
        }
        return;
      }

      // 3. Fallback: intentar cargar desde JSON
      const jsonFiles = ['PJ_Expedientes_2026-05-02 (4).json', 'PJ_Expedientes_2026-05-02.json', 'PJ_Expedientes_2026-05-01.json'];
      for (const jsonFile of jsonFiles) {
        try {
          const res = await fetch(jsonFile, { cache: 'no-store' });
          if (!res.ok) continue;
          const json = await res.json();
          const data = json.expedientes || json.data || [];
          if (data && data.length > 0) {
            expedientes.value = data;
            migrarValorAMonto();
            saveData();
            if (json.audiencias) {
              audiencias.value = json.audiencias;
              saveAudiencias();
            }
            notif('✓ ' + data.length + ' expedientes cargados desde ' + jsonFile, 'success');
            loadAudiencias();
            if (tabActivo.value === 0) {
              nextTick(() => setTimeout(drawAllCharts, 400));
            }
            return;
          }
        } catch(e) {
          console.warn('No se pudo cargar ' + jsonFile + ':', e);
        }
      }
    }

    function loadAudiencias() {
      try {
        audiencias.value = JSON.parse(localStorage.getItem('pj_audiencias') || '[]');
      } catch(e) {
        audiencias.value = [];
      }
    }

    function buscarExpediente() {
      if (!busquedaNum.value.trim()) {

      const found = expedientes.value.find(e => e.num === busquedaNum.value);

        notif('Expediente encontrado', 'success');
      } else {

      expForm.value = { ...exp, _originalNum: exp.num };

    }

    async function guardarExpediente() {
      if (!expForm.value.num) {
        notif('El numero de expediente es obligatorio', 'error');
        return;
      }

      // Check if expediente exists (for new records only)
      const idx = expedientes.value.findIndex(e => e.num === expForm.value.num);
      if (idx >= 0 && !expForm.value._originalNum) {
        notif('El expediente ' + expForm.value.num + ' ya existe en el sistema', 'error');
        return;
      }

      expForm.value.ultimaModif = new Date().toLocaleString('es-PE');

      if (idx >= 0) {
        // Usar splice para mantener reactividad
        const nuevoExpediente = { ...expForm.value };
        expedientes.value.splice(idx, 1, nuevoExpediente);
        notif('Expediente actualizado localmente', 'success');
      } else {
        expForm.value.fecha = expForm.value.fecha || new Date().toISOString().split('T')[0];
        expedientes.value.push({ ...expForm.value });
        notif('Nuevo expediente registrado', 'success');
      }

      saveData();
      pendingChanges.value++;

      if (sheetsUrl.value) {
        try {
          const ok = await guardarExpedienteSheets({ ...expForm.value, modificadoPor: usuario.value, version: Date.now() });
          if (ok) {
            notif('Expediente sincronizado con Sheets', 'success');
            pendingChanges.value = Math.max(0, pendingChanges.value - 1);
            registrarActividad(expForm.value._originalNum ? 'Actualizar' : 'Crear', expForm.value.num);
          } else {
            notif('Error: No se pudo sincronizar con Sheets. Revise la conexion.', 'error');
          }
        } catch (e) {
          console.error('Error guardando en Sheets:', e);
          notif('Error de red al sincronizar. El cambio esta guardado localmente.', 'warn');
        }
      }

      expSeleccionado.value = { ...expForm.value };
      nuevoExp.value = false;
      expForm.value = {};
    }

    async function eliminarExpediente() {
      if (!expSeleccionado.value) return;

      const numExp = expSeleccionado.value.num;

      // Prompt for password (simple confirmation)
      const password = prompt('Para eliminar el expediente ' + numExp + ', ingrese la contraseña actual:');
      if (!password) {
        confirmDelete.value = false;
        return;
      }

      const hash = await hashPassword(password);
      const storedHash = localStorage.getItem('pj_password_hash') || DEFAULT_HASH;

      if (hash !== storedHash) {
        notif('Contraseña incorrecta. No se eliminó el expediente.', 'error');
        confirmDelete.value = false;
        return;
      }

      const idx = expedientes.value.findIndex(e => e.num === numExp);
      if (idx >= 0) {
        expedientes.value.splice(idx, 1);
        saveData();
        pendingChanges.value++;
        if (sheetsUrl.value) {
          try {
            await eliminarExpedienteSheets(numExp);
            pendingChanges.value = Math.max(0, pendingChanges.value - 1);
            registrarActividad('Eliminar', numExp);
          } catch (e) {
            console.error('Error eliminando de Sheets:', e);
          }
        }
        notif('Expediente ' + numExp + ' eliminado', 'success');
      }

      expSeleccionado.value = null;
      confirmDelete.value = false;
      nuevoExp.value = false;
      expForm.value = {};
    }

    function limpiarForm() {
      expForm.value = {};
      expSeleccionado.value = null;
      nuevoExp.value = false;
      confirmDelete.value = false;
      busquedaNum.value = '';
    }

    function abrirModalAudiencia(aud = null) {

        audEdit.value = { ...aud };
      } else {
        audEdit.value = { _id: null, num: busquedaNum.value || '', fecha: '', hora: '', tipo: 'AUDIENCIA', sala: '', estado: 'Programada', obs: '' };

    async function guardarAudiencia() {
      if (!audEdit.value.num) {
        notif('El numero de expediente es obligatorio', 'error');
        return;
      }
      audEdit.value.version = Date.now();
      audEdit.value.modificadoPor = usuario.value;
      if (audEdit.value._id) {
        const idx = audiencias.value.findIndex(a => a._id === audEdit.value._id);
        if (idx >= 0) audiencias.value[idx] = { ...audiencias.value[idx], ...audEdit.value };
        notif('Audiencia actualizada localmente', 'success');
      } else {
        audEdit.value._id = Date.now();
        audiencias.value.push({ ...audEdit.value });
        notif('Audiencia registrada', 'success');
      }
      saveAudiencias();
      if (sheetsUrl.value) {
        try {
          const ok = await guardarAudienciaSheets({ ...audEdit.value });
          if (!ok) {
            notif('Error sincronizando audiencia con Sheets', 'error');
          } else {
            registrarActividad('Audiencia ' + (audEdit.value._id ? 'Actualizar' : 'Crear'), audEdit.value.num);
          }

    function dragStart(event, index) {
      dragIndex.value = index;
      event.dataTransfer.effectAllowed = 'move';
      event.dataTransfer.setData('text/plain', index);
    }

    function dragOver(event, index) {
      event.preventDefault();
      dragOverIndex.value = index;
    }

    function dragEnd(event) {
      dragIndex.value = -1;
      dragOverIndex.value = -1;
    }

    function dropAudiencia(event) {
      event.preventDefault();
      const fromIndex = dragIndex.value;
      const toIndex = dragOverIndex.value;

      if (fromIndex !== -1 && toIndex !== -1 && fromIndex !== toIndex) {
        const items = [...audiencias.value];
        const [movedItem] = items.splice(fromIndex, 1);
        items.splice(toIndex, 0, movedItem);
        audiencias.value = items;
        saveAudiencias();
        notif('Audiencias reordenadas', 'success');
      }
      dragIndex.value = -1;
      dragOverIndex.value = -1;
    }

    function mostrarListaKPI(kpi) {
      // Show a list of expedientes matching this KPI
      let lista = [];
      if (kpi.label === 'Total Expedientes') lista = expedientes.value;
      else if (kpi.label.includes('Trámite')) lista = expedientes.value.filter(e => e.estado === 'En Tramite' || e.estado === 'En proceso');
      else if (kpi.label.includes('Archivados')) lista = expedientes.value.filter(e => e.estado && e.estado.includes('Archivo'));
      else if (kpi.label.includes('Plazo')) lista = expedientes.value.filter(e => e.estado === 'Plazo Vencido');
      else if (kpi.label.includes('Priorit')) lista = expedientes.value.filter(e => e.prioritario === 'SI');
      else if (kpi.label.includes('FUND./INFUND.')) lista = expedientes.value.filter(e => e.resultado === 'FUNDADO' || e.resultado === 'INFUNDADO');
      else if (kpi.label.includes('Soles')) lista = expedientes.value.filter(e => parseFloat(e.montoSoles) > 0);
      else if (kpi.label.includes('Dolares')) lista = expedientes.value.filter(e => parseFloat(e.montoDolares) > 0);
      else if (kpi.label.includes('Euros')) lista = expedientes.value.filter(e => parseFloat(e.montoEuros) > 0);

      if (lista.length > 0) {
        kpiModalLista.value = lista.slice(0, 20); // Limit to 20
        kpiModalTitulo.value = kpi.label + ' (' + lista.length + ')';
        kpiModal.value = true;
      } else {
        notif('No hay expedientes para este indicador', 'info');
      }
    }

    // ========== GOOGLE SHEETS SYNC ==========
    function configurarSheets() {
      modalSheets.value = true;
      sheetsUrlInput.value = sheetsUrl.value;
    }

    function guardarSheetsConfig() {
      const url = sheetsUrlInput.value.trim();
      if (url) {
        const validPattern = /^https:\/\/script\.google\.com\/macros\/s\/[A-Za-z0-9_-]+\/exec$/;
        if (!validPattern.test(url)) {
          notif('URL invalida. Debe tener el formato exacto: https://script.google.com/macros/s/.../exec', 'error');
          return;
        }
      }
      sheetsUrl.value = url;
      localStorage.setItem('pj_sheets_url', url);
      modalSheets.value = false;
      notif(url ? 'Google Sheets configurado' : 'Google Sheets desvinculado', 'success');
    }

    async function syncDown() {
      if (!sheetsUrl.value) {
        configurarSheets();
        return;
      }
      syncStatus.value = 'syncing';
      try {
        const res = await fetchSheets('?action=get', { method: 'GET' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        let added = 0, updated = 0, conflicts = 0;
        const updatedByOthers = [];

        if (data.expedientes && Array.isArray(data.expedientes) && data.expedientes.length > 0) {
          data.expedientes.forEach(exp => {
            const idx = expedientes.value.findIndex(e => e.num === exp.num);
            const remoteVersion = parseInt(exp.version) || 0;
            if (idx >= 0) {
              const localVersion = parseInt(expedientes.value[idx].version) || 0;
              if (remoteVersion > localVersion) {
                expedientes.value[idx] = { ...expedientes.value[idx], ...exp };
                updated++;
                if (exp.modificadoPor && exp.modificadoPor !== usuario.value) {
                  updatedByOthers.push(exp.num);
                }
              } else if (localVersion > remoteVersion) {
                conflicts++;
              }
            } else {
              expedientes.value.push(exp);
              added++;
            }
          });
          if (added > 0 || updated > 0) saveData();
        }

        let audAdded = 0;
        if (data.audiencias && Array.isArray(data.audiencias) && data.audiencias.length > 0) {
          data.audiencias.forEach(aud => {
            const idx = audiencias.value.findIndex(a => a._id === aud._id);
            if (idx < 0) {
              audiencias.value.push(aud);
              audAdded++;
            } else {
              const remoteVer = parseInt(aud.version) || 0;
              const localVer = parseInt(audiencias.value[idx].version) || 0;
              if (remoteVer > localVer) {
                audiencias.value[idx] = { ...audiencias.value[idx], ...aud };
              }
            }
          });
          if (audAdded > 0) saveAudiencias();
        }

        lastSync.value = new Date().toLocaleString('es-PE');
        lastSyncTimestamp.value = Date.now();
        localStorage.setItem('pj_last_sync_ts', lastSyncTimestamp.value);
        syncStatus.value = 'synced';

        let msg = `Sincronizado: ${added} nuevos, ${updated} actualizados`;
        if (conflicts > 0) msg += `, ${conflicts} locales más recientes`;
        notif(msg, 'success');

        if (updatedByOthers.length > 0) {
          notif(`${updatedByOthers.length} expediente(s) actualizado(s) por otro usuario`, 'info');
        }

        if (tabActivo.value === 0) {
          nextTick(() => setTimeout(drawAllCharts, 300));
        }
      } catch (e) {
        syncStatus.value = 'error';
        console.error('Sync error:', e);
        notif('Error al sincronizar con Sheets: ' + e.message, 'error');
      }
    }

    async function syncUp(skipPassword = false) {
      if (!sheetsUrl.value) {
        configurarSheets();
        return;
      }
      if (!skipPassword && !await confirmarPassword('Confirme contraseña para subir datos a Sheets')) return;
      syncStatus.value = 'syncing';
      try {
        const payload = {
          action: 'syncUp',
          expedientes: expedientes.value,
          audiencias: audiencias.value,
          usuario: usuario.value
        };
        const res = await fetchSheets('', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        lastSync.value = new Date().toLocaleString('es-PE');
        lastSyncTimestamp.value = Date.now();
        localStorage.setItem('pj_last_sync_ts', lastSyncTimestamp.value);
        syncStatus.value = 'synced';
        pendingChanges.value = 0;
        notif(`Datos sincronizados con Sheets: ${data.updated || 0} actualizados, ${data.added || 0} nuevos`, 'success');
      } catch (e) {
        syncStatus.value = 'error';
        console.error('Sync up error:', e);
        notif('Error al subir a Sheets: ' + e.message, 'error');
      }
    }

    function toggleAutoSync() {
      autoSyncEnabled.value = !autoSyncEnabled.value;
      localStorage.setItem('pj_auto_sync', autoSyncEnabled.value);
      if (autoSyncEnabled.value) {
        notif('Sync automática activada (' + autoSyncInterval.value + ' min)', 'success');
        if (sheetsUrl.value) {
          autoSyncTimer = setInterval(async () => {
            if (pendingChanges.value > 0) {
              await syncUp(true);
            }
            await syncDown();
          }, autoSyncInterval.value * 60 * 1000);
        }
      } else {
        notif('Sync automática desactivada', 'info');
        if (autoSyncTimer) { clearInterval(autoSyncTimer); autoSyncTimer = null; }
      }
    }

    function toggleDarkMode() {
      darkMode.value = !darkMode.value;
      localStorage.setItem('pj_dark_mode', darkMode.value);
      if (darkMode.value) {
        document.body.classList.add('dark-mode');
      } else {
        document.body.classList.remove('dark-mode');
      }
    }

    async function exportPDF(exp) {
      if (!await confirmarPassword('Confirme contraseña para exportar PDF')) return;

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      // Header con fondo PJ
      doc.setFillColor(165, 32, 32);
      doc.rect(0, 0, 220, 38, 'F');

      // Logo PJ (izquierda del header)
      doc.addImage(LOGO_PJ_B64, 'PNG', 8, 4, 24, 26);

      doc.setTextColor(255, 255, 255);
      doc.setFontSize(16);
      doc.setFont('helvetica', 'bold');
      doc.text('PODER JUDICIAL DEL PERU', 38, 16);
      doc.setFontSize(11);
      doc.text('1º Juzgado Permanente - Extinción de Dominio', 38, 24);

      // Logo SNEED (extremo derecho del header)
      doc.addImage(LOGO_SNEED_B64, 'PNG', 168, 3, 35, 32);

      // Titulo expediente
      doc.setTextColor(30, 30, 30);
      doc.setFontSize(14);
      doc.setFont('helvetica', 'bold');
      doc.text('EXPEDIENTE: ' + exp.num, 14, 52);

      doc.setFontSize(10);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(80, 80, 80);

      // Datos principales
      const fmt = (d) => {
        if (!d || d === '-') return '-';
        const p = String(d).split('-');
        if (p.length === 3) return p[2] + '/' + p[1] + '/' + p[0];
        return d;
      };
      const datos = [
        ['Fecha', fmt(exp.fecha)],
        ['Asunto', exp.asunto || '-'],
        ['Estado', exp.estado || '-'],
        ['Fiscalía', exp.fiscalia || '-'],
        ['Demandantes', exp.demandante || '-'],
        ['Demandados', exp.demandados || '-'],
        ['Delito', exp.delito || '-'],
        ['Resultado', exp.resultado || '-'],
        ['Fecha Resolución', fmt(exp.fechaRes)],
        ['Responsable', exp.responsable || '-'],
        ['Juez', exp.juez || '-'],
        ['Abogado', exp.abogado || '-'],
        ['Bienes', exp.bien || exp.bienes || '-'],
        ['Descripción Bien', exp.descBien || '-'],
        ['Estado Bienes', exp.estadoBienes || '-'],
        ['Fecha Notificación', fmt(exp.fechaNotificacion)],
        ['Plazo Procesal', exp.plazoProcesal ? exp.plazoProcesal + ' días' : '-'],
        ['Fecha Vencimiento', fmt(exp.fechaVencimiento)],
        ['Monto Soles', exp.montoSoles ? 'S/ ' + exp.montoSoles : '-'],
        ['Monto Dolares', exp.montoDolares ? 'USD ' + exp.montoDolares : '-'],
        ['Monto Euros', exp.montoEuros ? 'EUR ' + exp.montoEuros : '-'],
        ['Partida Registral', exp.partidaRegistral || '-'],
        ['Ubicación', exp.ubicacion || '-'],
        ['Prioritario', exp.prioritario || '-'],
        ['Seguimiento', exp.seguimiento || '-'],
        ['Fecha Fin', fmt(exp.fechaFin)],
        ['Actos Procesales', exp.actosProcesales || '-']
      ];

      let y = 62;
      datos.forEach(([label, valor]) => {
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(100, 100, 100);
        doc.text(label + ':', 14, y);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(30, 30, 30);
        doc.text(String(valor).substring(0, 60), 50, y);
        y += 8;
      });

      // Observaciones
      if (exp.observaciones) {
        y += 6;
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(100, 100, 100);
        doc.text('Observaciones:', 14, y);
        y += 6;
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(30, 30, 30);
        const lines = doc.splitTextToSize(exp.observaciones, 180);
        doc.text(lines, 14, y);
      }

      // Footer
      const pageCount = doc.internal.getNumberOfPages();
      for (let i = 1; i <= pageCount; i++) {
        doc.setPage(i);
        doc.setFontSize(8);
        doc.setTextColor(150, 150, 150);
        doc.text('Generado: ' + new Date().toLocaleDateString('es-PE'), 14, 290);
        doc.text('Pagina ' + i + ' de ' + pageCount, 180, 290);
      }

      doc.save('Expediente_' + exp.num.replace(/[^a-zA-Z0-9]/g, '_') + '.pdf');
      notif('PDF exportado exitosamente', 'success');
    }
