    async function importJSON(event) {
      if (!await confirmarPassword('Confirme contraseña para importar JSON')) { event.target.value = ''; return; }
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          let added = 0, updated = 0;
          if (data.expedientes && Array.isArray(data.expedientes)) {
            data.expedientes.forEach(exp => {
              const idx = expedientes.value.findIndex(e => e.num === exp.num);
              if (idx < 0) {
                expedientes.value.push(exp);
                added++;
              } else {
                // Fusionar: conservar campos locales, actualizar con datos externos
                expedientes.value[idx] = { ...expedientes.value[idx], ...exp };
                updated++;
              }
            });
            saveData();
            notif('Sincronizado: ' + added + ' nuevos, ' + updated + ' actualizados. Total: ' + expedientes.value.length, 'success');
          }
          if (data.audiencias && Array.isArray(data.audiencias)) {
            let audAdded = 0;
            data.audiencias.forEach(aud => {
              const idx = audiencias.value.findIndex(a => a._id === aud._id);
              if (idx < 0) {
                audiencias.value.push(aud);
                audAdded++;
              }
            });
            saveAudiencias();
            if (audAdded > 0) {
              notif('Audiencias sincronizadas: ' + audAdded + ' nuevas', 'success');
            }
          }
        } catch(err) {
          notif('Error al importar JSON', 'error');
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    async function exportExcel() {
      if (!await confirmarPassword('Confirme contraseña para exportar Excel')) return;
      const exps = expedientes.value;
      if (!exps.length) { notif('No hay expedientes para exportar', 'warn'); return; }

      // CSV header
      const headers = ['NUMERO','FECHA','ASUNTO','ESTADO','UBICACION','FISCALIA','DELITO','RESULTADO','DEMANDADOS','DEMANDANTE','JUEZ','BIENES','MONEDA','MONTO_SOLES','MONTO_DOLARES','MONTO_EUROS','PARTIDA_REGISTRAL','FECHA_RES','FECHA_NOTIFICACION','PLAZO_PROCESAL','FECHA_VENCIMIENTO','PRIORITARIO','SEGUIMIENTO','ACTOS_PROCESALES','OBSERVACIONES'];
      const rows = exps.map(e => [
        e.num || '', e.fecha || '', e.asunto || '', e.estado || '', e.ubicacion || '',
        e.fiscalia || '', e.delito || '', e.resultado || '', e.demandados || '', e.demandante || '',
        e.juez || '', e.bien || e.bienes || '', e.moneda || '', e.montoSoles || '', e.montoDolares || '', e.montoEuros || '',
        e.partidaRegistral || '', e.fechaRes || '', e.fechaNotificacion || '', e.plazoProcesal || '', e.fechaVencimiento || '',
        e.prioritario || '', e.seguimiento || '', e.actosProcesales || '', e.observaciones || ''
      ]);

      // Build CSV with BOM for Excel UTF-8
      let csv = '﻿' + headers.join(';') + '\n';
      rows.forEach(row => {
        csv += row.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(';') + '\n';
      });

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'PJ_Expedientes_' + new Date().toISOString().split('T')[0] + '.csv';
      a.click();
      URL.revokeObjectURL(url);
      notif('Excel (CSV) exportado: ' + exps.length + ' registros', 'success');
    }

    async function importExcel(event) {
      if (!await confirmarPassword('Confirme contraseña para importar Excel')) { event.target.value = ''; return; }
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const text = e.target.result;
          const lines = text.split('\n').filter(l => l.trim());
          if (lines.length < 2) { notif('Archivo CSV vacio o invalido', 'error'); return; }

          const headers = lines[0].split(';').map(h => h.trim().replace(/^"|"$/g, '').toUpperCase());
          const imported = [];
          for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(';').map(c => c.trim().replace(/^"|"$/g, ''));
            if (!cols[0]) continue;
            const obj = {};
            headers.forEach((h, idx) => {
              const v = cols[idx] || '';
              if (h === 'NUMERO') obj.num = v;
              else if (h === 'FECHA') obj.fecha = v;
              else if (h === 'ASUNTO') obj.asunto = v;
              else if (h === 'ESTADO') obj.estado = v;
              else if (h === 'UBICACION') obj.ubicacion = v;
              else if (h === 'FISCALIA') obj.fiscalia = v;
              else if (h === 'DELITO') obj.delito = v;
              else if (h === 'RESULTADO') obj.resultado = v;
              else if (h === 'DEMANDADOS') obj.demandados = v;
              else if (h === 'DEMANDANTE') obj.demandante = v;
              else if (h === 'JUEZ') obj.juez = v;
              else if (h === 'BIENES') obj.bien = v;
              else if (h === 'MONEDA') obj.moneda = v;
              else if (h === 'MONTO_SOLES') obj.montoSoles = v;
              else if (h === 'MONTO_DOLARES') obj.montoDolares = v;
              else if (h === 'MONTO_EUROS') obj.montoEuros = v;
              else if (h === 'PARTIDA_REGISTRAL') obj.partidaRegistral = v;
              else if (h === 'FECHA_RES') obj.fechaRes = v;
              else if (h === 'FECHA_NOTIFICACION') obj.fechaNotificacion = v;
              else if (h === 'PLAZO_PROCESAL') obj.plazoProcesal = v;
              else if (h === 'FECHA_VENCIMIENTO') obj.fechaVencimiento = v;
              else if (h === 'PRIORITARIO') obj.prioritario = v;
              else if (h === 'SEGUIMIENTO') obj.seguimiento = v;
              else if (h === 'ACTOS_PROCESALES') obj.actosProcesales = v;
              else if (h === 'OBSERVACIONES') obj.observaciones = v;
            });
            imported.push(obj);
          }
          if (imported.length > 0) {
            expedientes.value = imported;
            saveData();
            notif('Excel (CSV) importado: ' + imported.length + ' expedientes', 'success');
          }
        } catch(err) {
          notif('Error al importar Excel', 'error');
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    // INIT ==========
    onMounted(async () => {
      // Apply dark mode if saved
      if (darkMode.value) {
        document.body.classList.add('dark-mode');
      }

      const token = localStorage.getItem('pj_device_token');
      if (token) {
        isLoggedIn.value = true;
        usuario.value = localStorage.getItem('pj_usuario_nombre') || 'Usuario';
        checkAdmin();
        loadData();
        startSessionTimer();
      }

      if (!isLoggedIn.value) {
        loadData();
      }

      // Activity listener for session refresh
      document.addEventListener('click', handleActivity);
      document.addEventListener('keypress', handleActivity);

      // Close user menu when clicking outside
      document.addEventListener('click', handleClickOutsideMenu);

      // Initialize push notifications
      checkNotificacionesPush();
      // Periodic check for deadlines and upcoming hearings (every 5 min)
      notifPushTimer = setInterval(checkPlazosYAudiencias, 5 * 60 * 1000);
      // Initial check after 30s
      setTimeout(checkPlazosYAudiencias, 30000);

      // Auto sync timer
      if (autoSyncEnabled.value && sheetsUrl.value) {
        autoSyncTimer = setInterval(async () => {
          if (pendingChanges.value > 0) {
            await syncUp(true);
          }
          await syncDown();
        }, autoSyncInterval.value * 60 * 1000);
      }

      // Initialize charts after DOM is ready
      nextTick(() => {
        setTimeout(() => {
          if (typeof Chart !== 'undefined' && tabActivo.value === 0) {
            drawAllCharts();
          }
        }, 400);
      });
    });

    onUnmounted(() => {
      document.removeEventListener('click', handleActivity);
      document.removeEventListener('keypress', handleActivity);
      document.removeEventListener('click', handleClickOutsideMenu);
      destroyCharts();
      if (notifPushTimer) clearInterval(notifPushTimer);
      if (autoSyncTimer) clearInterval(autoSyncTimer);
    });

    function handleActivity() {
      if (isLoggedIn.value) {
        startSessionTimer();
      }
    }

    function handleClickOutsideMenu(event) {
      if (!showUserMenu.value) return;
      const dropdown = document.querySelector('.user-dropdown');
      const trigger = document.querySelector('.user-name');
      if (dropdown && !dropdown.contains(event.target) && trigger && !trigger.contains(event.target)) {
        showUserMenu.value = false;
      }
    }

    function selectTab(i) {
      tabActivo.value = i;
      nextTick(() => {
        if (i === 0) {
          setTimeout(() => {
            if (expedientes.value && expedientes.value.length > 0) {
              drawAllCharts();
            } else {
              console.warn('Data not loaded yet, retrying...');
              setTimeout(() => drawAllCharts(), 500);
            }
          }, 500);
        }
      });
    }

    // Chart instances
    let chartInstances = {};

    function destroyCharts() {
      Object.values(chartInstances).forEach(chart => {
        if (chart) chart.destroy();
      });
      chartInstances = {};
    }

    // Plugin para mostrar valores exactos sobre elementos del grafico
    const chartLabelsPlugin = {
      id: 'chartLabels',
      afterDatasetsDraw(chart) {
        const { ctx } = chart;
        ctx.save();
        const isDark = document.body.classList.contains('dark-mode');
        ctx.font = 'bold 10px Barlow, sans-serif';
        ctx.fillStyle = isDark ? '#E8EAED' : '#1A1A2E';
        chart.data.datasets.forEach((dataset, i) => {
          const meta = chart.getDatasetMeta(i);
          if (!meta.hidden) {
            meta.data.forEach((el, index) => {
              const value = dataset.data[index];
              if (value == null || value === 0) return;
              if (chart.config.type === 'bar' || chart.config.type === 'horizontalBar') {
                const isHorizontal = chart.options.indexAxis === 'y';
                if (isHorizontal) {
                  ctx.textAlign = 'left';
                  ctx.textBaseline = 'middle';
                  ctx.fillText(value, el.x + 8, el.y);
                } else {
                  ctx.textAlign = 'center';
                  ctx.textBaseline = 'bottom';
                  ctx.fillText(value, el.x, el.y - 6);
                }
              } else if (chart.config.type === 'doughnut' || chart.config.type === 'pie' || chart.config.type === 'polarArea') {
                const model = el;
                const mid = model.startAngle + (model.endAngle - model.startAngle) / 2;
                const innerR = model.innerRadius || 0;
                const r = (model.outerRadius - innerR) * 0.55 + innerR;
                const x = model.x + Math.cos(mid) * r;
                const y = model.y + Math.sin(mid) * r;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#fff';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 4;
                ctx.fillText(value, x, y);
                ctx.shadowBlur = 0;
              }
            });
          }
        });
        ctx.restore();
      }
    };
    if (typeof Chart !== 'undefined') Chart.register(chartLabelsPlugin);

    // Handler de clic en graficos para filtrar expedientes
    function chartClickHandler(field, value) {
      if (!value) return;
      const lista = expedientes.value.filter(e => e[field] === value);
      if (lista.length > 0) {
        kpiModalLista.value = lista;
        kpiModalTitulo.value = `${field}: ${value} (${lista.length})`;
        kpiModal.value = true;
      } else {
        notif('No hay expedientes para esta categoria', 'info');
      }
    }

    function drawAllCharts() {
      if (typeof Chart === 'undefined') {
        console.warn('Chart.js no cargado aun');
        return;
      }
      destroyCharts();

      const exps = expedientes.value;
      if (!exps || exps.length === 0) {
        console.warn('DEBUG: No expediente data');
        return;
      }
      console.log('DEBUG: Drawing charts with', exps.length, 'expedientes');

      const isDark = document.body.classList.contains('dark-mode');

      const chartColors = [
        '#E11D48', '#2563EB', '#059669', '#D97706', '#7C3AED', '#0891B2',
        '#DB2777', '#65A30D', '#F59E0B', '#6366F1', '#EC4899', '#14B8A6',
        '#A855F7', '#EA580C', '#06B6D4'
      ];

      const chartColorsAlpha = chartColors.map(c => {
        const r = parseInt(c.slice(1,3),16), g = parseInt(c.slice(3,5),16), b = parseInt(c.slice(5,7),16);
        return `rgba(${r},${g},${b},0.75)`;
      });

      // Tooltip común
      const commonTooltip = {
        backgroundColor: isDark ? 'rgba(20, 28, 40, 0.95)' : 'rgba(26, 26, 46, 0.92)',
        titleColor: '#fff',
        bodyColor: '#E8EAED',
        titleFont: { size: 13, family: 'Barlow Condensed', weight: '700' },
        bodyFont: { size: 12, family: 'Barlow' },
        padding: 12,
        cornerRadius: 10,
        borderColor: 'rgba(165,32,32,0.3)',
        borderWidth: 1,
        displayColors: true
      };

      // Common bar options
      const commonBarOptions = (field, extra = {}) => ({
        responsive: false,
        maintainAspectRatio: true,
        animation: { duration: 1100, easing: 'easeOutQuart' },
        onClick: (e, elements) => {
          if (elements.length > 0) {
            const idx = elements[0].index;
            const label = elements[0].element.$context.chart.data.labels[idx];
            chartClickHandler(field, label);
          }
        },
        onHover: (e, elements) => {
          e.native.target.style.cursor = elements.length ? 'pointer' : 'default';
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            ...commonTooltip,
            callbacks: { label: ctx => ` ${ctx.raw} expedientes` }
          }
        },
        scales: {
          y: { beginAtZero: true, grid: { color: isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.04)' }, ticks: { stepSize: 1, font: { size: 9, family: 'Barlow' }, color: isDark ? '#6B7785' : '#7A7A8C' } },
          x: { grid: { display: false }, ticks: { font: { size: 9, family: 'Barlow' }, color: isDark ? '#6B7785' : '#7A7A8C' } }
        },
        ...extra
      });

      // Chart 1: Barras verticales con degradado - Expedientes por Asunto
      const asuntoCounts = {};
      exps.forEach(e => { if (e.asunto) asuntoCounts[e.asunto] = (asuntoCounts[e.asunto] || 0) + 1; });
      const asuntoEntries = Object.entries(asuntoCounts).sort((a, b) => b[1] - a[1]);
      const asuntoLabels = asuntoEntries.map(x => x[0]);
      const asuntoData = asuntoEntries.map(x => x[1]);

      if (asuntoLabels.length > 0) {
        const canvas = document.getElementById('chartAsunto');
        if (canvas) {
          const ctx = canvas.getContext('2d');
          const bgColors = asuntoLabels.map((_, i) => {
            const grad = ctx.createLinearGradient(0, 0, 0, 180);
            grad.addColorStop(0, chartColors[i % chartColors.length]);
            grad.addColorStop(1, chartColorsAlpha[i % chartColors.length]);
            return grad;
          });
          chartInstances.chartAsunto = new Chart(canvas, {
            type: 'bar',
            data: {
              labels: asuntoLabels,
              datasets: [{
                label: 'Expedientes',
                data: asuntoData,
                backgroundColor: bgColors,
                borderRadius: { topLeft: 8, topRight: 8 },
                barPercentage: 0.55,
                categoryPercentage: 0.75
              }]
            },
            options: commonBarOptions('asunto')
          });
        }
      }

      // Chart 2: Barras verticales con degradado neon - Ingresos por Anio
      const anioCounts = {};
      exps.forEach(e => {
        if (e.num) {
          const anio = e.num.split('-')[1];
          if (anio) anioCounts[anio] = (anioCounts[anio] || 0) + 1;
        }
      });
      const anioEntries = Object.entries(anioCounts).sort((a, b) => a[0].localeCompare(b[0]));
      const anioLabels = anioEntries.map(x => x[0]);
      const anioData = anioEntries.map(x => x[1]);

      if (anioLabels.length > 0) {
        const canvas = document.getElementById('chartAnios');
        if (canvas) {
          const ctx = canvas.getContext('2d');
          const bgColors = anioLabels.map((_, i) => {
            const c1 = chartColors[i % chartColors.length];
            const c2 = chartColors[(i + 3) % chartColors.length];
            const grad = ctx.createLinearGradient(0, 0, 0, 180);
            grad.addColorStop(0, c1);
            grad.addColorStop(1, c2);
            return grad;
          });
          chartInstances.chartAnios = new Chart(canvas, {
            type: 'bar',
            data: {
              labels: anioLabels,
              datasets: [{
                label: 'Expedientes',
                data: anioData,
                backgroundColor: bgColors,
                borderRadius: { topLeft: 10, topRight: 10 },
                barPercentage: 0.5,
                categoryPercentage: 0.7,
                borderSkipped: false
              }]
            },
            options: commonBarOptions('anio')
          });
        }
      }

      // Chart 3: DONA (doughnut) - Distribucion por Estado
      const estadoCounts = {};
      exps.forEach(e => { if (e.estado) estadoCounts[e.estado] = (estadoCounts[e.estado] || 0) + 1; });
      const estadoEntries = Object.entries(estadoCounts).sort((a, b) => b[1] - a[1]);
      const estadoLabels = estadoEntries.map(x => x[0]);
      const estadoData = estadoEntries.map(x => x[1]);

      if (estadoLabels.length > 0) {
        const canvas = document.getElementById('chartEstado');
        if (canvas) {
          chartInstances.chartEstado = new Chart(canvas, {
            type: 'doughnut',
            data: {
              labels: estadoLabels,
              datasets: [{
                data: estadoData,
                backgroundColor: chartColors.slice(0, estadoLabels.length),
                borderColor: isDark ? '#1A2332' : '#FFFFFF',
                borderWidth: 3,
                hoverOffset: 14,
                borderRadius: 6,
                spacing: 3
              }]
            },
            options: {
              responsive: false,
              maintainAspectRatio: true,
              animation: { animateScale: true, animateRotate: true, duration: 1200 },
              cutout: '58%',
              onClick: (e, elements) => {
                if (elements.length > 0) {
                  const idx = elements[0].index;
                  chartClickHandler('estado', estadoLabels[idx]);
                }
              },
              onHover: (e, elements) => { e.native.target.style.cursor = elements.length ? 'pointer' : 'default'; },
              plugins: {
                legend: {
                  position: 'right',
                  labels: { font: { size: 9, family: 'Barlow' }, color: isDark ? '#B0B8C1' : '#3D3D4E', padding: 10, usePointStyle: true, pointStyle: 'circle' }
                },
                tooltip: {
                  ...commonTooltip,
                  callbacks: {
                    label: ctx => {
                      const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                      const pct = ((ctx.raw / total) * 100).toFixed(1);
                      return ` ${ctx.label}: ${ctx.raw} (${pct}%)`;
                    }
                  }
                }
              }
            }
          });
        }
      }

      // Chart 4: POLAR AREA - Distribucion por Resultado
      const resultadoCounts = {};
      exps.forEach(e => { if (e.resultado) resultadoCounts[e.resultado] = (resultadoCounts[e.resultado] || 0) + 1; });
      const resultadoEntries = Object.entries(resultadoCounts).sort((a, b) => b[1] - a[1]);
      const resultadoLabels = resultadoEntries.map(x => x[0]);
      const resultadoData = resultadoEntries.map(x => x[1]);

      if (resultadoLabels.length > 0) {
        const canvas = document.getElementById('chartResultado');
        if (canvas) {
          const bgColors = resultadoLabels.map((_, i) => {
            const r = parseInt(chartColors[i % chartColors.length].slice(1,3),16);
            const g = parseInt(chartColors[i % chartColors.length].slice(3,5),16);
            const b = parseInt(chartColors[i % chartColors.length].slice(5,7),16);
            return `rgba(${r},${g},${b},0.7)`;
          });
          const borderColors = resultadoLabels.map((_, i) => chartColors[i % chartColors.length]);
          chartInstances.chartResultado = new Chart(canvas, {
            type: 'polarArea',
            data: {
              labels: resultadoLabels,
              datasets: [{
                data: resultadoData,
                backgroundColor: bgColors,
                borderColor: borderColors,
                borderWidth: 2,
                hoverOffset: 8
              }]
            },
            options: {
              responsive: false,
              maintainAspectRatio: true,
              animation: { duration: 1100 },
              scales: {
                r: {
                  ticks: { display: false, backdropColor: 'transparent' },
                  grid: { color: isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.05)' },
                  pointLabels: { font: { size: 9, family: 'Barlow' }, color: isDark ? '#B0B8C1' : '#3D3D4E' }
                }
              },
              onClick: (e, elements) => {
                if (elements.length > 0) {
                  const idx = elements[0].index;
                  chartClickHandler('resultado', resultadoLabels[idx]);
                }
              },
              onHover: (e, elements) => { e.native.target.style.cursor = elements.length ? 'pointer' : 'default'; },
              plugins: {
                legend: { display: false },
                tooltip: {
                  ...commonTooltip,
                  callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw} expedientes` }
                }
              }
            }
          });
        }
      }

      // Chart 5: Barras horizontales con colores individuales - Top Fiscalias
      const fiscaliaCounts = {};
      exps.forEach(e => { if (e.fiscalia) fiscaliaCounts[e.fiscalia] = (fiscaliaCounts[e.fiscalia] || 0) + 1; });
      const fiscaliaEntries = Object.entries(fiscaliaCounts).sort((a, b) => b[1] - a[1]).slice(0, 10);
      const fiscaliaLabels = fiscaliaEntries.map(x => x[0]);
      const fiscaliaData = fiscaliaEntries.map(x => x[1]);

      if (fiscaliaLabels.length > 0) {
        const canvas = document.getElementById('chartBienes');
        if (canvas) {
          const bgColors = fiscaliaLabels.map((_, i) => {
            const c = chartColors[i % chartColors.length];
            const r = parseInt(c.slice(1,3),16), g = parseInt(c.slice(3,5),16), b = parseInt(c.slice(5,7),16);
            return `rgba(${r},${g},${b},0.85)`;
          });
          chartInstances.chartBienes = new Chart(canvas, {
            type: 'bar',
            data: {
              labels: fiscaliaLabels,
              datasets: [{
                label: 'Expedientes',
                data: fiscaliaData,
                backgroundColor: bgColors,
                borderRadius: 8,
                barPercentage: 0.6,
                categoryPercentage: 0.8,
                borderSkipped: false
              }]
            },
            options: commonBarOptions('fiscalia', { indexAxis: 'y' })
          });
        }
      }

      // Chart 6: Linea con area suavizada y puntos grandes - Tendencia por Mes
      const mesCounts = {};
      const mesNames = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
      exps.forEach(e => {
        if (e.fecha) {
          const parts = e.fecha.split('-');
          if (parts.length === 3) {
            const key = mesNames[parseInt(parts[1]) - 1] + '-' + parts[0];
            mesCounts[key] = (mesCounts[key] || 0) + 1;
          }
        }
      });
      const sortedMeses = Object.keys(mesCounts).sort();
      const mesData = sortedMeses.map(m => mesCounts[m]);

      if (sortedMeses.length > 0) {
        const canvas = document.getElementById('chartTendencia');
        if (canvas) {
          const ctx = canvas.getContext('2d');
          const fillGrad = ctx.createLinearGradient(0, 0, 0, 190);
          fillGrad.addColorStop(0, 'rgba(225, 29, 72, 0.4)');
          fillGrad.addColorStop(0.5, 'rgba(165, 32, 32, 0.15)');
          fillGrad.addColorStop(1, 'rgba(165, 32, 32, 0.01)');

          const strokeGrad = ctx.createLinearGradient(0, 0, canvas.width || 320, 0);
          strokeGrad.addColorStop(0, '#E11D48');
          strokeGrad.addColorStop(0.5, '#A52020');
          strokeGrad.addColorStop(1, '#7C3AED');

          chartInstances.chartTendencia = new Chart(canvas, {
            type: 'line',
            data: {
              labels: sortedMeses,
              datasets: [{
                label: 'Expedientes',
                data: mesData,
                borderColor: strokeGrad,
                backgroundColor: fillGrad,
                fill: true,
                tension: 0.45,
                pointRadius: 4,
                pointHoverRadius: 8,
                pointBackgroundColor: chartColors.slice(0, sortedMeses.length),
                pointBorderColor: isDark ? '#1A2332' : '#fff',
                pointBorderWidth: 2,
                borderWidth: 2
              }]
            },
            options: {
              responsive: false,
              maintainAspectRatio: true,
              animation: { duration: 1100, easing: 'easeOutQuart' },
              interaction: { mode: 'index', intersect: false },
              onClick: (e, elements) => {
                if (elements.length > 0) {
                  notif(`Periodo ${sortedMeses[elements[0].index]}: ${mesData[elements[0].index]} expedientes`, 'info');
                }
              },
              plugins: {
                legend: { display: false },
                tooltip: {
                  ...commonTooltip,
                  callbacks: { label: ctx => ` Mes ${ctx.label}: ${ctx.raw} expedientes` }
                }
              },
              scales: {
                y: { beginAtZero: true, grid: { color: isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.04)' }, ticks: { stepSize: 1, font: { size: 9 }, color: isDark ? '#6B7785' : '#7A7A8C' } },
                x: { grid: { display: false }, ticks: { font: { size: 9 }, color: isDark ? '#6B7785' : '#7A7A8C' } }
              }

function ensureSheets(ss) {
  let sheets = ['Expedientes','Audiencias','Usuarios','Actividad','Config'];
  sheets.forEach(name => {
    if (!ss.getSheetByName(name)) ss.insertSheet(name);
  });
}

function getSheetData(sheet) {
  const rows = sheet.getDataRange().getValues();
  if (rows.length < 1) return [];
  const headers = rows[0];
  const out = [];
  for (let i = 1; i < rows.length; i++) {
    const obj = {};
    headers.forEach((h, idx) => obj[h] = rows[i][idx] || '');
    out.push(obj);
  }
  return out;
}

function doGet(e) {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  ensureSheets(ss);
  const action = e.parameter.action || 'get';

  if (action === 'getUsuarios') {
    const sheetU = ss.getSheetByName('Usuarios');
    const sheetA = ss.getSheetByName('Actividad');
    return ContentService.createTextOutput(JSON.stringify({
      usuarios: getSheetData(sheetU),
      actividad: getSheetData(sheetA).slice(-100)
    })).setMimeType(ContentService.MimeType.JSON);
  }

  const sheetExp = ss.getSheetByName('Expedientes');
  const sheetAud = ss.getSheetByName('Audiencias');
  return ContentService.createTextOutput(JSON.stringify({
    expedientes: getSheetData(sheetExp),
    audiencias: getSheetData(sheetAud)
  })).setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  const data = JSON.parse(e.postData.contents);
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  ensureSheets(ss);

  if (data.action === 'upload') {
    let sheetExp = ss.getSheetByName('Expedientes');
    let sheetAud = ss.getSheetByName('Audiencias');
    const expHeaders = [
      'num','fecha','asunto','estado','ubicacion','fiscalia','delito','resultado',
      'demandados','demandante','juez','bienes','moneda','montoSoles','montoDolares',
      'montoEuros','partidaRegistral','fechaRes','fechaNotificacion','plazoProcesal',
      'fechaVencimiento','prioritario','seguimiento','actosProcesales','observaciones',
      'responsable','abogado','descBien','estadoBienes','fechaFin','ultimaModif',
      'modificadoPor','version'
    ];
    const audHeaders = ['_id','num','fecha','hora','tipo','sala','estado','obs'];

    if (sheetExp.getLastRow() > 1) {
      sheetExp.getRange(2, 1, sheetExp.getLastRow() - 1, sheetExp.getLastColumn()).clear();
    }
    if (sheetAud.getLastRow() > 1) {
      sheetAud.getRange(2, 1, sheetAud.getLastRow() - 1, sheetAud.getLastColumn()).clear();
    }

    (data.expedientes || []).forEach(row => {
      const arr = expHeaders.map(h => row[h] || '');
      sheetExp.appendRow(arr);
    });
    (data.audiencias || []).forEach(row => {
      const arr = audHeaders.map(h => row[h] || '');
      sheetAud.appendRow(arr);
    });
    return ContentService.createTextOutput(JSON.stringify({ success: true })).setMimeType(ContentService.MimeType.JSON);
  }

  if (data.action === 'syncUp') {
    let sheet = ss.getSheetByName('Expedientes');
    const rows = sheet.getDataRange().getValues();
    const headers = rows[0];
    const numIdx = headers.indexOf('num');
    const versionIdx = headers.indexOf('version');
    let updated = 0, added = 0;
    const toAppend = [];
    const toUpdate = [];

    (data.expedientes || []).forEach(exp => {
      let found = false;
      const localVersion = parseInt(exp.version) || 0;
      for (let i = 1; i < rows.length; i++) {
        if (rows[i][numIdx] === exp.num) {
          const remoteVersion = parseInt(rows[i][versionIdx]) || 0;
          if (localVersion >= remoteVersion) {
            const rowData = headers.map(h => exp[h] !== undefined ? exp[h] : '');
            toUpdate.push({ rowIndex: i + 1, data: rowData });
            updated++;
          }
          found = true;
          break;
        }
      }
      if (!found) {
        const arr = headers.map(h => exp[h] !== undefined ? exp[h] : '');
        toAppend.push(arr);
        added++;
      }
    });

    if (toUpdate.length > 0) {
      toUpdate.forEach(item => {
        const range = sheet.getRange(item.rowIndex, 1, 1, headers.length);
        range.setValues([item.data]);
      });
    }

    if (toAppend.length > 0) {
      const startRow = sheet.getLastRow() + 1;
      sheet.getRange(startRow, 1, toAppend.length, headers.length).setValues(toAppend);
    }

    let audSheet = ss.getSheetByName('Audiencias');
    const audRows = audSheet.getDataRange().getValues();
    const audHeaders = audRows[0];
    const audIdIdx = audHeaders.indexOf('_id');
    const audToAppend = [];
    const audToUpdate = [];

    (data.audiencias || []).forEach(aud => {
      let found = false;
      for (let i = 1; i < audRows.length; i++) {
        if (String(audRows[i][audIdIdx]) === String(aud._id)) {
          const rowData = audHeaders.map(h => aud[h] !== undefined ? aud[h] : '');
          audToUpdate.push({ rowIndex: i + 1, data: rowData });
          found = true; break;
        }
      }
      if (!found) {
        const arr = audHeaders.map(h => aud[h] || '');
        audToAppend.push(arr);
      }
    });

    if (audToUpdate.length > 0) {
      audToUpdate.forEach(item => {
        const range = audSheet.getRange(item.rowIndex, 1, 1, audHeaders.length);
        range.setValues([item.data]);
      });
    }

    if (audToAppend.length > 0) {
      const startRow = audSheet.getLastRow() + 1;
      audSheet.getRange(startRow, 1, audToAppend.length, audHeaders.length).setValues(audToAppend);
    }

    return ContentService.createTextOutput(JSON.stringify({ success: true, updated, added })).setMimeType(ContentService.MimeType.JSON);
  }

  if (data.action === 'saveExp') {
    let sheet = ss.getSheetByName('Expedientes');
    const rows = sheet.getDataRange().getValues();
    const headers = rows[0];
    const numIdx = headers.indexOf('num');
    let found = false;
    for (let i = 1; i < rows.length; i++) {
      if (rows[i][numIdx] === data.expediente.num) {
        headers.forEach((h, idx) => {
          if (data.expediente[h] !== undefined) {
            sheet.getRange(i + 1, idx + 1).setValue(data.expediente[h]);
          }
        });
        found = true; break;
      }
    }
    if (!found) {
      const arr = headers.map(h => data.expediente[h] || '');
      sheet.appendRow(arr);
    }
    return ContentService.createTextOutput(JSON.stringify({ success: true })).setMimeType(ContentService.MimeType.JSON);
  }

  if (data.action === 'deleteExp') {
    let sheet = ss.getSheetByName('Expedientes');
    const rows = sheet.getDataRange().getValues();
    const numIdx = rows[0].indexOf('num');
    for (let i = 1; i < rows.length; i++) {
      if (rows[i][numIdx] === data.num) {
        sheet.deleteRow(i + 1); break;
      }
    }
    return ContentService.createTextOutput(JSON.stringify({ success: true })).setMimeType(ContentService.MimeType.JSON);
  }

  if (data.action === 'saveAud') {
    let sheet = ss.getSheetByName('Audiencias');
    const rows = sheet.getDataRange().getValues();
    const headers = rows[0];
    const idIdx = headers.indexOf('_id');
    let found = false;
    for (let i = 1; i < rows.length; i++) {
      if (String(rows[i][idIdx]) === String(data.audiencia._id)) {
        headers.forEach((h, idx) => {
          if (data.audiencia[h] !== undefined) {
            sheet.getRange(i + 1, idx + 1).setValue(data.audiencia[h]);
          }
        });
        found = true; break;
      }
    }
    if (!found) {
      const arr = headers.map(h => data.audiencia[h] || '');
      sheet.appendRow(arr);
    }
    return ContentService.createTextOutput(JSON.stringify({ success: true })).setMimeType(ContentService.MimeType.JSON);
  }

  if (data.action === 'logActividad') {
    let sheet = ss.getSheetByName('Actividad');
    sheet.appendRow([data.timestamp, data.usuario, data.accion, data.expedienteNum, data.campo, data.valorAnterior, data.valorNuevo]);
    return ContentService.createTextOutput(JSON.stringify({ success: true })).setMimeType(ContentService.MimeType.JSON);
  }

  if (data.action === 'updateUsuario') {
    let sheet = ss.getSheetByName('Usuarios');
    const rows = sheet.getDataRange().getValues();
    const headers = rows[0];
    const nameIdx = headers.indexOf('nombre');
    let found = false;
    for (let i = 1; i < rows.length; i++) {
      if (rows[i][nameIdx] === data.nombre) {
        if (data.estado !== undefined) sheet.getRange(i + 1, headers.indexOf('estado') + 1).setValue(data.estado);
        if (data.rol !== undefined) sheet.getRange(i + 1, headers.indexOf('rol') + 1).setValue(data.rol);
        found = true; break;
      }
    }
    if (!found) {
      const arr = headers.map(h => {
        if (h === 'nombre') return data.nombre;
        if (h === 'estado') return data.estado || 'activo';
        if (h === 'rol') return data.rol || 'user';
        if (h === 'ultimaConexion') return new Date().toISOString();
        return '';
      });
      sheet.appendRow(arr);
    }
    return ContentService.createTextOutput(JSON.stringify({ success: true })).setMimeType(ContentService.MimeType.JSON);
  }

  return ContentService.createTextOutput(JSON.stringify({ error: 'Accion no reconocida' })).setMimeType(ContentService.MimeType.JSON);
}
